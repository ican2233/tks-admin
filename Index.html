<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Firebase Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center">
        <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Smart Admin</h1>
        <p class="text-[10px] opacity-70 tracking-[0.4em] uppercase mt-1">Firebase Edition • Powered By Ican</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div class="bg-slate-900/80 backdrop-blur-md p-6 rounded-3xl border border-white/5 mb-6 shadow-xl">
            <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Pilih Database (Node)</label>
            <select id="lockSelector" onchange="switchDatabase()" class="w-full p-4 bg-slate-800 rounded-2xl font-bold text-sm border border-slate-600 text-white outline-none focus:border-blue-500 transition">
                <option value="lock1">DATABASE LOCK 1 (Main)</option>
                <option value="lock2">DATABASE LOCK 2 (Mod)</option>
            </select>
        </div>

        <div id="userEditorArea" class="bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-emerald-500 border border-white/5">
            <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-user-plus mr-2"></i> Manajemen User
            </h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Device ID / Key</label>
                    <input type="text" id="field_id" placeholder="Contoh: a880d1..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none shadow-inner">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Username</label>
                    <input type="text" id="field_username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Password / Key</label>
                    <input type="text" id="field_password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Expires Date</label>
                    <input type="date" id="field_expiry" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="flex items-center justify-between p-4 bg-slate-800/50 border border-slate-700 rounded-2xl">
                    <label class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Allow Offline</label>
                    <select id="field_offline" class="bg-indigo-600 text-white text-[10px] font-black rounded-lg px-3 py-1 outline-none">
                        <option value="true">TRUE</option>
                        <option value="false">FALSE</option>
                    </select>
                </div>
            </div>

            <button onclick="saveUser()" id="btnSave" class="w-full mt-8 bg-emerald-600 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-lg active:scale-95 transition">
                Simpan ke Firebase
            </button>
        </div>

        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="searchInput" onkeyup="filterUser()" placeholder="Cari ID atau Username..." class="w-full p-5 pl-14 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm focus:border-blue-500 shadow-xl">
        </div>

        <div id="userList" class="space-y-4">
            </div>
    </div>

    <script>
        // --- KONFIGURASI FIREBASE ---
        // GANTI DENGAN KODE MILIK ANDA DARI SETELAN PROJECT FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "panel-2a2fd.firebaseapp.com",
            databaseURL: "https://panel-2a2fd-default-rtdb.firebaseio.com",
            projectId: "panel-2a2fd",
            storageBucket: "panel-2a2fd.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPath = "lock1"; // Folder default saat dibuka

        // Load data otomatis saat halaman dibuka
        window.onload = () => {
            loadFirebaseData();
        };

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            loadFirebaseData();
        }

        function loadFirebaseData() {
            const list = document.getElementById('userList');
            // Listen data real-time
            db.ref(currentPath).on('value', (snapshot) => {
                const data = snapshot.val();
                list.innerHTML = ''; 

                if (!data) {
                    list.innerHTML = '<div class="text-center opacity-30 text-xs py-10 uppercase font-bold tracking-widest">Database Kosong</div>';
                    return;
                }

                for (let id in data) {
                    const u = data[id];
                    list.innerHTML += `
                        <div class="bg-slate-900/60 p-5 rounded-[2.5rem] border border-white/5 shadow-lg animate-in fade-in duration-300">
                            <div class="flex justify-between items-center mb-3">
                                <div class="font-black text-white italic uppercase">${u.username || 'NO NAME'}</div>
                                <div class="flex gap-2">
                                    <button onclick="editUser('${id}', '${u.username}', '${u.password || u.key}', '${u.expiresAt}', ${u.allowOffline})" class="w-9 h-9 bg-blue-500/10 text-blue-400 rounded-xl border border-blue-500/20"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="deleteUser('${id}')" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl border border-red-500/20"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl space-y-1 text-[10px]">
                                <div class="flex justify-between border-b border-white/5 pb-1"> <span class="opacity-50 uppercase">ID</span> <span class="text-blue-300 font-bold">${id}</span> </div>
                                <div class="flex justify-between border-b border-white/5 py-1"> <span class="opacity-50 uppercase">EXP</span> <span class="text-amber-400 font-bold">${u.expiresAt}</span> </div>
                                <div class="flex justify-between pt-1"> <span class="opacity-50 uppercase">OFFLINE</span> <span class="${u.allowOffline ? 'text-emerald-400' : 'text-red-400'} font-bold">${u.allowOffline ? 'YES' : 'NO'}</span> </div>
                            </div>
                        </div>`;
                }
            });
        }

        async function saveUser() {
            const id = document.getElementById('field_id').value;
            if(!id) return alert("ID Device tidak boleh kosong!");

            const userData = {
                username: document.getElementById('field_username').value,
                password: document.getElementById('field_password').value,
                expiresAt: document.getElementById('field_expiry').value,
                allowOffline: document.getElementById('field_offline').value === 'true'
            };

            try {
                // Simpan ke Firebase berdasarkan Path lock1/lock2 yang dipilih
                await db.ref(currentPath + '/' + id).set(userData);
                alert("Berhasil disimpan ke " + currentPath.toUpperCase());
                clearForm();
            } catch (e) {
                alert("Gagal: " + e.message);
            }
        }

        function editUser(id, user, pass, exp, offline) {
            document.getElementById('field_id').value = id;
            document.getElementById('field_username').value = user;
            document.getElementById('field_password').value = pass;
            document.getElementById('field_expiry').value = exp;
            document.getElementById('field_offline').value = offline.toString();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteUser(id) {
            if(confirm("Hapus user " + id + "?")) {
                db.ref(currentPath + '/' + id).remove(); // Hapus dari Firebase
            }
        }

        function clearForm() {
            document.getElementById('field_id').value = '';
            document.getElementById('field_username').value = '';
            document.getElementById('field_password').value = '';
            document.getElementById('field_expiry').value = '';
        }

        function filterUser() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#userList > div').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>
  </html>
