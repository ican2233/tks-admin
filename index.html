<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 14px 24px; border-radius: 18px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); margin-bottom: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; border-left: 5px solid #10b981; animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div id="toast-container"></div>

    <!-- Modal Hapus -->
    <div id="confirmModal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs border-t-4 border-red-500 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-trash-can text-2xl"></i></div>
            <h3 class="text-white font-black uppercase italic mb-2">Hapus Data?</h3>
            <p class="text-slate-400 text-[10px] mb-8 leading-tight">Data akan dihapus permanen.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-red-500/20">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Login -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500 shadow-2xl">
            <div class="text-center mb-8"><i class="fa-solid fa-user-shield text-4xl text-blue-500 mb-4"></i><h2 class="text-xl font-black italic uppercase">Admin Access</h2></div>
            <input type="email" id="loginEmail" placeholder="Email Admin" class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
            <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
            <button onclick="checkAdminLogin()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-xs uppercase">Login System</button>
        </div>
    </div>

    <!-- Main -->
    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] text-center relative">
            <button onclick="doLogout()" class="absolute right-6 top-6 text-white/50"><i class="fa-solid fa-power-off"></i></button>
            <h1 class="text-2xl font-black italic text-white uppercase">TKS TEAM Admin</h1>
        </div>

        <div class="max-w-md mx-auto px-4">
            <div id="adminTabNav" class="hidden flex gap-2 mb-6">
                <button onclick="switchTab('users')" id="tab-users" class="flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg">User Management</button>
                <button onclick="switchTab('admins')" id="tab-admins" class="flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic">Admin Settings</button>
            </div>

            <div id="usersTab">
                <div class="glass-card p-6 rounded-3xl mb-4">
                    <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-3 rounded-xl font-bold text-xs border border-slate-600 mb-4">
                        <option value="lock1">Lock Password</option>
                        <option value="lock2" selected>Lock Pass & Username</option>
                        <option value="autologin">Lock Auto Login</option>
                    </select>
                    <div class="flex gap-2 mb-4">
                        <button onclick="backupData()" class="flex-1 bg-indigo-600/20 border border-indigo-500/50 text-indigo-400 p-3 rounded-2xl font-black text-[10px] uppercase">Backup</button>
                        <button onclick="document.getElementById('restoreInput').click()" class="flex-1 bg-emerald-600/20 border border-emerald-500/50 text-emerald-400 p-3 rounded-2xl font-black text-[10px] uppercase">Restore</button>
                        <input type="file" id="restoreInput" class="hidden" accept=".json" onchange="restoreData(event)">
                    </div>
                    <input type="text" id="searchInput" onkeyup="renderUsers()" placeholder="Search..." class="w-full p-3 bg-black/30 border border-slate-700 rounded-xl text-xs">
                </div>
                <div id="userEditorArea" class="glass-card p-6 rounded-[2.5rem] mb-6 border-l-8 border-emerald-500">
                    <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-4 uppercase">Tambah User</h2>
                    <input type="text" id="field_id" placeholder="ID Device" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <div id="usernameContainer"><input type="text" id="field_username" placeholder="Username" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm"></div>
                    <div id="passwordContainer"><input type="text" id="field_password" placeholder="Key / Password" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm"></div>
                    <input type="date" id="field_expiry" class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <button id="submitBtn" onclick="saveUser()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black text-xs uppercase">Simpan User</button>
                </div>
                <div id="userList" class="space-y-4"></div>
            </div>

            <div id="adminsTab" class="hidden">
                <div class="glass-card p-6 rounded-[2.5rem] border-l-8 border-amber-500">
                    <h2 class="text-amber-400 font-black text-xs mb-4 uppercase">Owner Control</h2>
                    <input type="email" id="newAdminEmail" placeholder="Email..." class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <input type="text" id="newAdminPass" placeholder="Password..." class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <button onclick="saveAdmin()" class="w-full bg-amber-600 p-4 rounded-2xl font-black text-[10px] uppercase">Update Admin</button>
                </div>
                <div id="adminList" class="mt-6 space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
    const SUPER_ADMIN_EMAIL = "suwandiikhsan1@gmail.com"; 
    const firebaseConfig = { databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com" };
    
    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    
    // DB bisa diakses global
    const db = firebase.database();

    let loggedInEmail = localStorage.getItem('tks_admin_email');
    let currentPath = "lock2";
    let rawData = null;
    let deleteIndexTarget = -1;

    window.onload = () => { if (localStorage.getItem('tks_admin_session') === 'active') showPanel(); };

    async function checkAdminLogin() {
    // 1. Ambil input
    const email = document.getElementById('loginEmail').value;
    const pass = document.getElementById('loginPass').value;

    if (!email || !pass) {
        alert("Email dan Password wajib diisi!");
        return;
    }

    try {
        // 2. Inisialisasi Auth di dalam fungsi untuk menghindari error "not initialized"
        const auth = firebase.auth();
        
        // 3. Coba Login
        await auth.signInWithEmailAndPassword(email, pass);
        
        // 4. Jika berhasil
        localStorage.setItem('tks_admin_session', 'active');
        localStorage.setItem('tks_admin_email', email);
        loggedInEmail = email;
        
        // Panggil fungsi utama
        showPanel();
        
    } catch (e) {
        // Jika error, tampilkan di alert agar Anda tahu masalahnya
        console.error(e);
        alert("Login Gagal: " + e.message);
    }
}


    function showPanel() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        if (loggedInEmail === SUPER_ADMIN_EMAIL) {
            document.getElementById('adminTabNav').classList.remove('hidden');
            loadAdminList();
        }
        switchDatabase();
    }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            loadFirebaseData();
        }

        function loadFirebaseData() {
            db.ref(currentPath).on('value', (s) => { rawData = s.val(); renderUsers(); });
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            let users = (currentPath === "autologin") ? (rawData?.Users || []) : (Array.isArray(rawData) ? rawData : Object.values(rawData || {}));
            list.innerHTML = '';
            users.forEach((u, i) => {
                if(!u) return;
                if (searchVal && !JSON.stringify(u).toLowerCase().includes(searchVal)) return;
                list.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-xs font-bold">${u.username || u.id || u.ID}</span>
                    <div class="flex gap-2">
                        <button onclick="editUser(${i})" class="text-blue-400"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deleteUser(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
            });
        }

        function deleteUser(i) {
            deleteIndexTarget = i;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = async () => {
                let users = (currentPath === "autologin") ? [...(rawData.Users || [])] : (Array.isArray(rawData) ? [...rawData] : Object.values(rawData || {}));
                users.splice(deleteIndexTarget, 1);
                let data = (currentPath === "autologin") ? {...rawData, Users: users} : users;
                await db.ref(currentPath).set(data);
                closeConfirm(); showToast("User Dihapus");
            };
        }

        function confirmDeleteAdmin(i) {
            deleteIndexTarget = i;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = async () => {
                const s = await db.ref('AdminAccount').once('value');
                let admins = Array.isArray(s.val()) ? [...s.val()] : Object.values(s.val() || {});
                admins.splice(deleteIndexTarget, 1);
                await db.ref('AdminAccount').set(admins);
                closeConfirm(); showToast("Admin Dihapus");
            };
        }

        function loadAdminList() {
            db.ref('AdminAccount').on('value', (s) => {
                const admins = Array.isArray(s.val()) ? s.val() : Object.values(s.val() || {});
                const list = document.getElementById('adminList');
                list.innerHTML = '';
                admins.forEach((a, i) => {
                    if(!a) return;
                    list.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center">
                        <span class="text-xs font-bold">${a.email}</span>
                        ${a.email !== SUPER_ADMIN_EMAIL ? `<button onclick="confirmDeleteAdmin(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>` : ''}
                    </div>`;
                });
            });
        }

        function showToast(m, t='success') {
            const c = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${t==='error'?'border-red-500':'border-emerald-500'}`;
            toast.innerHTML = m; c.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
        function doLogout() { localStorage.clear(); location.reload(); }
        function switchTab(t) {
            document.getElementById('usersTab').classList.toggle('hidden', t !== 'users');
            document.getElementById('adminsTab').classList.toggle('hidden', t !== 'admins');
        }
    </script>
</body>
</html>
