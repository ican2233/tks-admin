<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Firebase Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center">
        <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Smart Admin</h1>
        <p class="text-[10px] opacity-70 tracking-[0.4em] uppercase mt-1">Firebase Edition • Powered By Ican</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div class="bg-slate-900/80 backdrop-blur-md p-6 rounded-3xl border border-white/5 mb-6 shadow-xl">
            <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Pilih Database (Node)</label>
            <select id="lockSelector" onchange="switchDatabase()" class="w-full p-4 bg-slate-800 rounded-2xl font-bold text-sm border border-slate-600 text-white outline-none focus:border-blue-500 transition">
                <option value="lock1">DATABASE LOCK 1 (Main)</option>
                <option value="lock2">DATABASE LOCK 2 (Mod)</option>
                <option value="autologin">CONFIG AUTOLOGIN (JSON)</option>
            </select>
        </div>

        <div id="configArea" class="hidden bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-blue-500 border border-white/5">
            <h2 class="text-blue-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-gear mr-2"></i> Global Config
            </h2>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Admin Telegram URL</label>
                    <input type="text" id="cfg_adminUrl" placeholder="https://t.me/..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Marquee / Running Text</label>
                    <textarea id="cfg_marquee" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none h-20"></textarea>
                </div>
            </div>
        </div>

        <div id="userEditorArea" class="bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-emerald-500 border border-white/5">
            <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-user-plus mr-2"></i> Manajemen User
            </h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Device ID</label>
                    <input type="text" id="field_id" placeholder="Contoh: 3BA4A9..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div id="usernameContainer" class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Username</label>
                    <input type="text" id="field_username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Password / Key</label>
                    <input type="text" id="field_password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Expires Date</label>
                    <input type="text" id="field_expiry" placeholder="DD/MM/YYYY" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
            </div>

            <button onclick="saveData()" id="btnSave" class="w-full mt-8 bg-emerald-600 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-lg active:scale-95 transition">
                Simpan ke Firebase
            </button>
        </div>

        <div id="userList" class="space-y-4"></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPath = "lock2"; 
        let fullData = {}; 

        window.onload = () => { switchDatabase(); };

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            const uContainer = document.getElementById('usernameContainer');
            const cArea = document.getElementById('configArea');
            
            // UI logic
            if(currentPath === "autologin") {
                cArea.classList.remove('hidden');
                uContainer.classList.add('hidden');
            } else {
                cArea.classList.add('hidden');
                uContainer.classList.toggle('hidden', currentPath === "lock1");
            }
            
            loadFirebaseData();
        }

        function loadFirebaseData() {
            const list = document.getElementById('userList');
            db.ref(currentPath).on('value', (snapshot) => {
                const data = snapshot.val();
                list.innerHTML = ''; 
                fullData = data || (currentPath === "autologin" ? {AdminUrl:"", Marquee:"", Users:[]} : []);

                if (currentPath === "autologin") {
                    document.getElementById('cfg_adminUrl').value = fullData.AdminUrl || "";
                    document.getElementById('cfg_marquee').value = fullData.Marquee || "";
                }

                let usersToDisplay = currentPath === "autologin" ? (fullData.Users || []) : (Array.isArray(fullData) ? fullData : Object.values(fullData));

                usersToDisplay.forEach((u, index) => {
                    if(!u) return;
                    const displayName = u.username || u.ID || u.id;
                    list.innerHTML += `
                        <div class="bg-slate-900/60 p-5 rounded-[2.5rem] border border-white/5 shadow-lg mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="font-black text-white italic uppercase">${displayName}</div>
                                <button onclick="deleteData(${index})" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl border border-red-500/20"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl text-[10px] space-y-1">
                                <div>ID: ${u.ID || u.id}</div>
                                <div>EXP: ${u.Expiry || u.expiresAt}</div>
                            </div>
                        </div>`;
                });
            });
        }

        async function saveData() {
            const id = document.getElementById('field_id').value;
            if(!id) return alert("ID wajib diisi!");

            if (currentPath === "autologin") {
                fullData.AdminUrl = document.getElementById('cfg_adminUrl').value;
                fullData.Marquee = document.getElementById('cfg_marquee').value;
                if(!fullData.Users) fullData.Users = [];
                
                const newUser = { ID: id, Expiry: document.getElementById('field_expiry').value };
                const idx = fullData.Users.findIndex(u => u.ID === id);
                if(idx !== -1) fullData.Users[idx] = newUser; else fullData.Users.push(newUser);
            } else {
                const newUser = { 
                    id: id, 
                    password: document.getElementById('field_password').value,
                    key: document.getElementById('field_password').value,
                    expiresAt: document.getElementById('field_expiry').value,
                    allowOffline: true
                };
                if(currentPath === "lock2") newUser.username = document.getElementById('field_username').value;
                
                if(!Array.isArray(fullData)) fullData = [];
                const idx = fullData.findIndex(u => u && u.id === id);
                if(idx !== -1) fullData[idx] = newUser; else fullData.push(newUser);
            }

            await db.ref(currentPath).set(fullData);
            alert("Berhasil!");
        }

        function deleteData(index) {
            if(!confirm("Hapus?")) return;
            if(currentPath === "autologin") fullData.Users.splice(index, 1);
            else fullData.splice(index, 1);
            db.ref(currentPath).set(fullData);
        }
    </script>
</body>
</html>
