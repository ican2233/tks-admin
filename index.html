    <script>
        const SUPER_ADMIN_EMAIL = "suwandiikhsan1@gmail.com"; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
            authDomain: "admin-panel-tks.firebaseapp.com",
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            projectId: "admin-panel-tks",
            storageBucket: "admin-panel-tks.firebasestorage.app",
            messagingSenderId: "543562286942",
            appId: "1:543562286942:web:8ba8d50b09610c9d1331cf"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let loggedInEmail = localStorage.getItem('tks_admin_email');
        let currentPath = "lock2";
        let cachedData = null;
        let editKey = null;

        window.onload = () => { 
            if (localStorage.getItem('tks_admin_session') === 'active') showPanel();
        };

        async function checkAdminLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (email === SUPER_ADMIN_EMAIL && pass === "suwandi123") {
                localStorage.setItem('tks_admin_session', 'active');
                localStorage.setItem('tks_admin_email', email);
                showPanel();
            } else {
                alert("Login Gagal!");
            }
        }

        function showPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            switchDatabase();
        }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            db.ref(currentPath).off();
            loadFirebaseData();
        }

        function loadFirebaseData() {
            db.ref(currentPath).on('value', (snapshot) => {
                cachedData = snapshot.val();
                renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = '';
            // Ambil data dari path 'Users' jika di mode autologin
            const usersObj = (currentPath === 'autologin') ? (cachedData?.Users || {}) : (cachedData || {});
            let count = 0;

            Object.entries(usersObj).forEach(([key, u]) => {
                if(!u || typeof u !== 'object') return;
                count++;
                
                // DETEKSI FIELD (Cari username/user dan password/key/pass)
                const dUser = u.username || u.Username || u.user || "No Username";
                const dPass = u.password || u.key || u.Pass || u.pass || "No Password";
                const dID = u.id || u.ID || key;
                const dExp = u.expiresAt || u.Expiry || "-";

                list.innerHTML += `
                    <div class="glass-card p-5 rounded-[2rem] mb-4 border-l-4 border-blue-600 shadow-lg">
                        <div class="flex justify-between items-start mb-3">
                            <div class="w-full">
                                <p class="text-[9px] text-blue-400 font-black uppercase tracking-widest mb-1">Username</p>
                                <h3 class="text-white font-black italic uppercase text-sm">${dUser}</h3>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editUser('${key}')" class="w-8 h-8 bg-blue-500/10 text-blue-400 rounded-lg"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                <button onclick="triggerDelete('${key}', 'user')" class="w-8 h-8 bg-red-500/10 text-red-400 rounded-lg"><i class="fa-solid fa-trash text-[10px]"></i></button>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 bg-black/40 p-3 rounded-2xl border border-white/5">
                            <div>
                                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Password / Key</p>
                                <p class="text-emerald-400 font-mono text-[10px] font-bold tracking-wider">${dPass}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">ID Device</p>
                                <p class="text-blue-300 font-bold text-[9px] truncate">${dID}</p>
                            </div>
                        </div>
                        <div class="mt-2 pl-1">
                             <p class="text-[8px] text-amber-500 font-bold uppercase tracking-tighter">Kadaluarsa: ${dExp}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('totalUserCounter').innerText = count;
        }

        async function saveUser() {
            const devId = document.getElementById('field_id').value.trim();
            const user = document.getElementById('field_username').value.trim();
            const pass = document.getElementById('field_password').value.trim();
            const exp = document.getElementById('field_expiry').value;

            if(!devId || !exp) return alert("Minimal ID & Exp diisi!");

            // Kita simpan ke banyak field sekaligus biar aman kebaca aplikasi manapun
            const newUser = { 
                id: devId, ID: devId, 
                username: user, Username: user, 
                password: pass, key: pass, Pass: pass,
                expiresAt: exp, Expiry: exp 
            };

            const path = (currentPath === 'autologin') ? `autologin/Users` : currentPath;
            
            if(editKey) {
                await db.ref(`${path}/${editKey}`).update(newUser);
                editKey = null;
            } else {
                await db.ref(path).push(newUser);
            }
            
            showToast("Data Berhasil Disimpan!");
            clearForm();
        }

        function editUser(key) {
            const u = (currentPath === 'autologin') ? cachedData.Users[key] : cachedData[key];
            editKey = key;
            document.getElementById('formTitle').innerText = "Update User";
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('field_id').value = u.id || u.ID || '';
            document.getElementById('field_username').value = u.username || u.Username || '';
            document.getElementById('field_password').value = u.password || u.key || u.Pass || '';
            document.getElementById('field_expiry').value = u.expiresAt || u.Expiry || '';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function triggerDelete(key) {
            if(confirm("Hapus user ini?")) {
                const path = (currentPath === 'autologin') ? `autologin/Users/${key}` : `${currentPath}/${key}`;
                db.ref(path).remove();
                showToast("Data Dihapus", "error");
            }
        }

        function clearForm() {
            editKey = null;
            document.getElementById('formTitle').innerText = "Tambah User";
            document.getElementById('cancelBtn').classList.add('hidden');
            ['field_id','field_username','field_password','field_expiry'].forEach(id => document.getElementById(id).value = '');
        }

        function doLogout() { localStorage.clear(); location.reload(); }
        function showToast(m, t='success') { alert(m); }
    </script>
