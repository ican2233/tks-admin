<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin - Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 14px 24px;
            border-radius: 18px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); margin-bottom: 10px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; border-left: 5px solid #10b981;
            animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div id="toast-container"></div>

    <div id="confirmModal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs border-t-4 border-red-500 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h3 id="modalTitle" class="text-white font-black uppercase italic mb-2">Konfirmasi</h3>
            <p id="modalDesc" class="text-slate-400 text-[10px] mb-8 leading-tight">Apakah Anda yakin ingin menghapus data ini secara permanen?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-red-500/20">Hapus</button>
            </div>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-user-shield text-2xl text-white"></i>
                </div>
                <h2 class="text-xl font-black italic uppercase tracking-tighter">Secure Admin Access</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Admin" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500 transition-all">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500 transition-all">
                <button id="btnLogin" onclick="handleSecureLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-black text-xs uppercase transition shadow-lg active:scale-95">Verify Identity</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center relative">
            <button onclick="doLogout()" class="absolute right-6 top-6 text-white/50 hover:text-white transition">
                <i class="fa-solid fa-power-off"></i>
            </button>
            <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Admin</h1>
            <p id="roleBadge" class="text-[9px] font-bold opacity-60 mt-1 uppercase tracking-widest"></p>
        </div>

        <div class="max-w-md mx-auto px-4">
            <div id="adminTabNav" class="hidden flex gap-2 mb-6">
                <button onclick="switchTab('users')" id="tab-users" class="flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg">User Management</button>
                <button onclick="switchTab('admins')" id="tab-admins" class="flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic">Admin Settings</button>
            </div>

            <div id="usersTab">
                <div class="glass-card p-6 rounded-3xl mb-4 shadow-xl">
                    <div class="flex justify-between items-end mb-4">
                        <div class="w-1/2">
                            <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Mode Database</label>
                            <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-3 rounded-xl font-bold text-xs border border-slate-600 text-white outline-none">
                                <option value="lock1">Lock Password Only</option>
                                <option value="lock2" selected>Lock Pass & Username</option>
                                <option value="autologin">Lock Auto Login</option>
                            </select>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div class="flex gap-2">
                                <button onclick="backupData()" class="w-8 h-8 bg-blue-500/20 text-blue-400 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cloud-arrow-down text-xs"></i></button>
                                <button onclick="triggerRestore()" class="w-8 h-8 bg-amber-500/20 text-amber-400 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cloud-arrow-up text-xs"></i></button>
                                <input type="file" id="restoreFile" class="hidden" accept=".json" onchange="handleRestore(this)">
                            </div>
                            <p id="totalUserCounter" class="text-3xl font-black text-white italic leading-none">0</p>
                        </div>
                    </div>
                    <input type="text" id="searchInput" onkeyup="filterUserList()" placeholder="Cari user..." class="w-full p-3 bg-black/30 border border-slate-700 rounded-xl text-xs outline-none">
                </div>

                <div id="userEditorArea" class="glass-card p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-emerald-500">
                    <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase">Tambah User</h2>
                    <div class="space-y-4">
                        <input type="text" id="field_id" placeholder="ID Device" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <input type="text" id="field_username" placeholder="Username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <input type="text" id="field_password" placeholder="Key / Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <input type="date" id="field_expiry" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <select id="field_offline" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                            <option value="true">ALLOW OFFLINE: TRUE</option>
                            <option value="false">ALLOW OFFLINE: FALSE</option>
                        </select>
                    </div>
                    <button onclick="saveUser()" class="w-full bg-emerald-600 p-5 rounded-2xl font-black text-xs uppercase mt-6">Simpan User</button>
                </div>
                <div id="userList" class="space-y-4"></div>
            </div>

            <div id="adminsTab" class="hidden">
                <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-amber-500">
                    <h2 class="text-amber-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-crown mr-2"></i> Admin Control
                    </h2>
                    <div class="space-y-4">
                        <input type="email" id="newAdminEmail" placeholder="Email Admin..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <input type="text" id="newAdminPass" placeholder="Password Admin..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <button onclick="saveAdmin()" class="w-full bg-amber-600 hover:bg-amber-500 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg transition">Tambah/Update Admin</button>
                    </div>
                </div>
                <div id="adminList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPER_ADMIN_EMAIL = "suwandiikhsan1@gmail.com"; 
        const firebaseConfig = {
            apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
            authDomain: "admin-panel-tks.firebaseapp.com",
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            projectId: "admin-panel-tks",
            storageBucket: "admin-panel-tks.firebasestorage.app",
            messagingSenderId: "543562286942",
            appId: "1:543562286942:web:8ba8d50b09610c9d1331cf",
            measurementId: "G-QZ8YWVRHGZ"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentPath = "lock2";
        let rawData = null;
        let deleteIndexTarget = -1;
        let deleteType = ""; // "user" atau "admin"

        // AUTH & NAVIGATION
        auth.onAuthStateChanged((user) => {
            if (user) { showPanel(user); } 
            else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
            }
        });

        async function handleSecureLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if (!email || !pass) return showToast("Lengkapi data!", "error");
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showToast("Identity Verified");
            } catch (e) { showToast("Akses Ditolak!", "error"); }
        }

        function showPanel(user) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            const role = user.email === SUPER_ADMIN_EMAIL ? "SUPER_ADMIN" : "ADMIN";
            document.getElementById('roleBadge').innerText = `${user.email} (${role})`;
            if (role === "SUPER_ADMIN") {
                document.getElementById('adminTabNav').classList.remove('hidden');
                loadAdminList();
            }
            switchDatabase();
        }

        function switchTab(tab) {
            document.getElementById('usersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('adminsTab').classList.toggle('hidden', tab !== 'admins');
            document.getElementById('tab-users').className = tab === 'users' ? 'flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg' : 'flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic';
            document.getElementById('tab-admins').className = tab === 'admins' ? 'flex-1 p-3 rounded-2xl bg-amber-600 text-[10px] font-black uppercase italic shadow-lg' : 'flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic';
        }

        // DATABASE LOGIC
        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            loadFirebaseData();
        }

        function loadFirebaseData() {
            db.ref(currentPath).on('value', (snapshot) => {
                rawData = snapshot.val();
                renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            const usersArray = Array.isArray(rawData) ? rawData : (rawData ? Object.values(rawData) : []);
            list.innerHTML = '';
            usersArray.forEach((u, index) => {
                if(!u) return;
                list.innerHTML += `
                    <div class="glass-card p-5 rounded-[2.5rem] mb-4 border-l-4 border-slate-800">
                        <div class="flex justify-between items-center">
                            <div class="font-black text-white italic uppercase text-sm">${u.username || u.id}</div>
                            <button onclick="triggerDeleteUser(${index})" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl"><i class="fa-solid fa-trash text-xs"></i></button>
                        </div>
                    </div>`;
            });
            document.getElementById('totalUserCounter').innerText = usersArray.length;
        }

        // MODAL LOGIC (THE PRETTY DELETE)
        function triggerDeleteUser(index) {
            deleteType = "user";
            deleteIndexTarget = index;
            document.getElementById('modalTitle').innerText = "Hapus User?";
            document.getElementById('modalDesc').innerText = "Data user ini akan dihapus permanen dari database " + currentPath;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = executeDelete;
        }

        function triggerDeleteAdmin(index, email) {
            deleteType = "admin";
            deleteIndexTarget = index;
            document.getElementById('modalTitle').innerText = "Copot Admin?";
            document.getElementById('modalDesc').innerText = "Hapus akses panel untuk: " + email;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = executeDelete;
        }

        async function executeDelete() {
            if (deleteType === "user") {
                let users = Array.isArray(rawData) ? [...rawData] : Object.values(rawData);
                users.splice(deleteIndexTarget, 1);
                await db.ref(currentPath).set(users);
            } else {
                const snapshot = await db.ref('AdminAccount').once('value');
                let admins = Array.isArray(snapshot.val()) ? [...snapshot.val()] : Object.values(snapshot.val());
                admins.splice(deleteIndexTarget, 1);
                await db.ref('AdminAccount').set(admins);
            }
            showToast("Data Berhasil Dihapus", "error");
            closeConfirm();
        }

        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }

        // ADMIN MANAGEMENT
        function loadAdminList() {
            db.ref('AdminAccount').on('value', (snapshot) => {
                const list = document.getElementById('adminList');
                list.innerHTML = '';
                const admins = Array.isArray(snapshot.val()) ? snapshot.val() : (snapshot.val() ? Object.values(snapshot.val()) : []);
                admins.forEach((admin, index) => {
                    if(!admin) return;
                    const isSuper = admin.email === SUPER_ADMIN_EMAIL;
                    list.innerHTML += `
                        <div class="glass-card p-4 rounded-3xl flex justify-between items-center border border-white/5 mb-3">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center text-[10px]">
                                    <i class="fa-solid ${isSuper ? 'fa-crown text-amber-500' : 'fa-user text-blue-400'}"></i>
                                </div>
                                <span class="text-xs font-bold text-slate-300 italic">${admin.email}</span>
                            </div>
                            ${!isSuper ? `<button onclick="triggerDeleteAdmin(${index}, '${admin.email}')" class="w-8 h-8 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition"><i class="fa-solid fa-user-minus text-[10px]"></i></button>` : ''}
                        </div>`;
                });
            });
        }

        async function saveAdmin() {
            const email = document.getElementById('newAdminEmail').value.trim();
            const pass = document.getElementById('newAdminPass').value.trim();
            if(!email || !pass) return showToast("Isi Email & Password!", "error");
            
            const snapshot = await db.ref('AdminAccount').once('value');
            let admins = Array.isArray(snapshot.val()) ? [...snapshot.val()] : (snapshot.val() ? Object.values(snapshot.val()) : []);
            
            if (admins.some(a => a && a.email === email)) return showToast("Email sudah terdaftar!", "error");
            
            admins.push({ email, pass });
            await db.ref('AdminAccount').set(admins);
            showToast("Admin Baru Ditambahkan");
            document.getElementById('newAdminEmail').value = ''; document.getElementById('newAdminPass').value = '';
        }

        // UTILS
        function showToast(m, t='success') {
            const c = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${t==='error'?'border-red-500':'border-emerald-500'}`;
            toast.innerHTML = m; c.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        function doLogout() { auth.signOut(); }
    </script>
</body>
</html>
