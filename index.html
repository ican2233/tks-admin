<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 14px 24px;
            border-radius: 18px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); margin-bottom: 10px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; border-left: 5px solid #10b981;
            animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div id="toast-container"></div>

    <div id="confirmModal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs border-t-4 border-red-500 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-trash-can text-2xl"></i>
            </div>
            <h3 class="text-white font-black uppercase italic mb-2">Hapus Data?</h3>
            <p class="text-slate-400 text-[10px] mb-8 leading-tight">Data akan dihapus permanen dari sistem.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-red-500/20">Hapus</button>
            </div>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-user-shield text-2xl text-white"></i>
                </div>
                <h2 class="text-xl font-black italic uppercase tracking-tighter">Admin Access</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Admin" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500">
                <button onclick="checkAdminLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-black text-xs uppercase transition shadow-lg">Login System</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center relative">
            <button onclick="doLogout()" class="absolute right-6 top-6 text-white/50 hover:text-white transition">
                <i class="fa-solid fa-power-off"></i>
            </button>
            <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Admin</h1>
        </div>

        <div class="max-w-md mx-auto px-4">
            
            <div id="adminTabNav" class="hidden flex gap-2 mb-6">
                <button onclick="switchTab('users')" id="tab-users" class="flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg">User Management</button>
                <button onclick="switchTab('admins')" id="tab-admins" class="flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic">Admin Settings</button>
            </div>

            <div id="usersTab">
                <div class="flex gap-2 mb-4">
                    <button onclick="backupData()" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white p-3 rounded-2xl font-black text-[10px] uppercase shadow-lg transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-download"></i> Backup
                    </button>
                    <label class="flex-1 bg-slate-700 hover:bg-slate-600 text-white p-3 rounded-2xl font-black text-[10px] uppercase shadow-lg transition flex items-center justify-center gap-2 cursor-pointer text-center">
                        <i class="fa-solid fa-upload"></i> Restore
                        <input type="file" id="restoreFile" class="hidden" onchange="restoreData(event)" accept=".json">
                    </label>
                </div>

                <div class="glass-card p-6 rounded-3xl mb-4 shadow-xl">
                    <div class="flex justify-between items-end mb-4">
                        <div class="w-2/3">
                            <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Mode Database</label>
                            <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-3 rounded-xl font-bold text-xs border border-slate-600 text-white outline-none">
                                <option value="lock1">Lock Password</option>
                                <option value="lock2" selected>Lock Pass & Username</option>
                                <option value="autologin">Lock Auto Login</option>
                            </select>
                        </div>
                        <div class="text-right">
                            <p id="totalUserCounter" class="text-3xl font-black text-white italic leading-none">0</p>
                        </div>
                    </div>
                    <div class="relative mt-2">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="searchInput" onkeyup="filterUserList()" placeholder="Search" class="w-full p-3 pl-10 bg-black/30 border border-slate-700 rounded-xl text-xs outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div id="configArea" class="hidden glass-card p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-blue-500">
                    <h2 class="text-blue-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-gear mr-2"></i> Config Global
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="cfg_adminUrl" placeholder="Admin Telegram URL..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <textarea id="cfg_marquee" placeholder="Marquee / Running Text..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none h-16"></textarea>
                        <button onclick="saveGlobalConfig()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg transition">Simpan Config Global</button>
                    </div>
                </div>

                <div id="userEditorArea" class="glass-card p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-emerald-500">
                    <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-user-plus mr-2"></i> Tambah User
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="field_id" placeholder="ID Device" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <div id="usernameContainer"><input type="text" id="field_username" placeholder="Username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none"></div>
                        <div id="passwordContainer"><input type="text" id="field_password" placeholder="Key / Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none"></div>
                        <input type="date" id="field_expiry" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <div id="offlineContainer" class="bg-black/40 p-4 rounded-2xl border border-slate-700 flex justify-between items-center">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Allow Offline</span>
                            <select id="field_offline" class="bg-blue-600 text-white font-bold text-[10px] px-3 py-1 rounded-lg outline-none cursor-pointer">
                                <option value="true">TRUE</option>
                                <option value="false">FALSE</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8">
                        <button id="cancelBtn" onclick="clearForm()" class="hidden flex-1 bg-slate-700 p-5 rounded-2xl font-black text-xs uppercase transition">Batal</button>
                        <button id="submitBtn" onclick="saveUser()" class="flex-[2] bg-emerald-600 p-5 rounded-2xl font-black text-xs uppercase transition">Simpan User</button>
                    </div>
                </div>

                <div id="userList" class="space-y-4 mt-6"></div>
            </div>

            <div id="adminsTab" class="hidden">
                <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-amber-500">
                    <h2 class="text-amber-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-crown mr-2"></i> Owner Control
                    </h2>
                    <div class="space-y-4">
                        <input type="email" id="newAdminEmail" placeholder="Email Admin..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <input type="text" id="newAdminPass" placeholder="Password Admin..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <button onclick="saveAdmin()" class="w-full bg-amber-600 hover:bg-amber-500 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg transition">Update/Tambah Admin</button>
                    </div>
                </div>
                <div id="adminList" class="space-y-4"></div>
            </div>

        </div>
    </div>

    <script>
        const SUPER_ADMIN_EMAIL = "suwandiikhsan1@gmail.com"; 
        // Konfigurasi lengkap sesuai data terbaru
const firebaseConfig = {
  apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
  authDomain: "admin-panel-tks.firebaseapp.com",
  databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
  projectId: "admin-panel-tks",
  storageBucket: "admin-panel-tks.firebasestorage.app",
  messagingSenderId: "543562286942",
  appId: "1:543562286942:web:8ba8d50b09610c9d1331cf",
  measurementId: "G-QZ8YWVRHGZ"
};

// Pastikan inisialisasi menggunakan versi compat agar cocok dengan script di <head>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

 

        let loggedInEmail = localStorage.getItem('tks_admin_email');
        let currentPath = "lock2";
        let rawData = null;
        let editingIndex = -1;
        let deleteIndexTarget = -1;

        window.onload = () => { 
            if (localStorage.getItem('tks_admin_session') === 'active') showPanel(); 
        };

        // --- FITUR BACKUP & RESTORE ---
        function backupData() {
            if (!rawData) return showToast("Tidak ada data untuk dibackup", "error");
            const dataStr = JSON.stringify(rawData, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `Backup_${currentPath}_${new Date().toLocaleDateString()}.json`;
            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            showToast("Backup Berhasil!");
        }

        function restoreData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const json = JSON.parse(e.target.result);
                    if (confirm(`Timpa data ${currentPath} dengan file ini?`)) {
                        await db.ref(currentPath).set(json);
                        showToast("Restore Berhasil!");
                        document.getElementById('restoreFile').value = '';
                    }
                } catch (err) { showToast("File tidak valid!", "error"); }
            };
            reader.readAsText(file);
        }
        // ------------------------------

        async function checkAdminLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value.trim();

    if (!email || !pass) return showToast("Isi Email & Password!", "error");

    try {
        // 1. LOGIN RESMI KE FIREBASE AUTH (Pintu Utama)
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email, pass);
        
        // 2. SIMPAN SESI
        localStorage.setItem('tks_admin_session', 'active');
        localStorage.setItem('tks_admin_email', email);
        loggedInEmail = email;

        showToast("Login Berhasil!");
        showPanel();
    } catch (error) {
        // Jika error, cek apakah karena salah ketik atau jaringan
        console.error("Login Error:", error.code);
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
            showToast("Email atau Password salah!", "error");
        } else {
            showToast("Gagal Login: " + error.message, "error");
        }
    }
}


        function showPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            if (loggedInEmail === SUPER_ADMIN_EMAIL) {
                document.getElementById('adminTabNav').classList.remove('hidden');
                loadAdminList();
            }
            switchDatabase();
        }

        function doLogout() { localStorage.clear(); location.reload(); }

        function switchTab(tab) {
            document.getElementById('usersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('adminsTab').classList.toggle('hidden', tab !== 'admins');
            document.getElementById('tab-users').className = tab === 'users' ? 'flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg' : 'flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic';
            document.getElementById('tab-admins').className = tab === 'admins' ? 'flex-1 p-3 rounded-2xl bg-amber-600 text-[10px] font-black uppercase italic shadow-lg' : 'flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic';
        }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            const isAuto = currentPath === "autologin";
            const isLock1 = currentPath === "lock1";
            
            document.getElementById('usernameContainer').classList.toggle('hidden', isAuto || isLock1);
            document.getElementById('passwordContainer').classList.toggle('hidden', isAuto);
            document.getElementById('offlineContainer').classList.toggle('hidden', isAuto);
            document.getElementById('configArea').classList.toggle('hidden', !isAuto);
            
            document.getElementById('searchInput').value = ''; 
            clearForm();
            loadFirebaseData();
        }

        function loadFirebaseData() {
            db.ref(currentPath).on('value', (snapshot) => {
                rawData = snapshot.val();
                if (currentPath === "autologin" && rawData) {
                    document.getElementById('cfg_adminUrl').value = rawData.AdminUrl || "";
                    document.getElementById('cfg_marquee').value = rawData.Marquee || "";
                }
                if (!rawData) { 
                    document.getElementById('totalUserCounter').innerText = "0"; 
                    document.getElementById('userList').innerHTML = ''; 
                    return; 
                }
                renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            let usersArray = (currentPath === "autologin") ? (rawData.Users || []) : (Array.isArray(rawData) ? rawData : Object.values(rawData));
            list.innerHTML = '';
            let count = 0;

            usersArray.forEach((u, index) => {
                if(!u) return;
                const searchStr = `${u.username || ''} ${u.id || u.ID || ''} ${u.key || u.password || ''}`.toLowerCase();
                if (searchVal && !searchStr.includes(searchVal)) return;

                count++;
                const isAuto = currentPath === "autologin";
                const displayTitle = (!isAuto && u.username) ? u.username : (u.id || u.ID);
                const isOffline = (u.allowOffline === true || u.allowOffline === "true");
                const offlineBadge = isOffline ? '<span class="text-emerald-400 font-bold">YES</span>' : '<span class="text-red-400 font-bold">NO</span>';

                list.innerHTML += `
                    <div class="glass-card p-5 rounded-[2.5rem] mb-4">
                        <div class="flex justify-between items-center mb-3">
                            <div class="font-black text-white italic uppercase text-sm truncate pr-4">${displayTitle}</div>
                            <div class="flex gap-2">
                                <button onclick="editUser(${index})" class="w-9 h-9 bg-blue-500/10 text-blue-400 rounded-xl"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="deleteUser(${index})" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                        </div>
                        <div class="bg-black/40 p-4 rounded-2xl text-[10px] space-y-1">
                            <div class="flex justify-between"><span class="opacity-40">ID</span><span class="text-blue-300 font-bold">${u.id || u.ID}</span></div>
                            ${u.username ? `<div class="flex justify-between border-t border-white/5 pt-1 mt-1"><span class="opacity-40">USER</span><span>${u.username}</span></div>` : ''}
                            ${!isAuto ? `<div class="flex justify-between border-t border-white/5 pt-1 mt-1"><span class="opacity-40">KEY</span><span class="text-indigo-400 font-bold">${u.key || u.password || "-"}</span></div>` : ''}
                            <div class="flex justify-between border-t border-white/5 pt-1 mt-1"><span class="opacity-40">EXP</span><span class="text-amber-400 font-bold">${u.Expiry || u.expiresAt || "-"}</span></div>
                            ${!isAuto ? `<div class="flex justify-between border-t border-white/5 pt-1 mt-1"><span class="opacity-40">OFFLINE</span>${offlineBadge}</div>` : ''}
                        </div>
                    </div>`;
            });
            document.getElementById('totalUserCounter').innerText = count;
        }

        async function saveUser() {
    const user = firebase.auth().currentUser;
    if (!user) return showToast("Sesi habis, silakan login ulang!", "error");

    const devId = document.getElementById('field_id').value.trim();
    const expVal = document.getElementById('field_expiry').value;
    
    if(!devId || !expVal) return showToast("ID & Exp Wajib Isi!", "error");

    try {
        let dataToSave;
        if (currentPath === "autologin") {
            let data = rawData || { Users: [] };
            const newUser = { ID: devId, Expiry: formatDateToDMY(expVal) };
            if (editingIndex !== -1) data.Users[editingIndex] = newUser; 
            else data.Users.push(newUser);
            dataToSave = data;
        } else {
            let users = Array.isArray(rawData) ? [...rawData] : (rawData ? Object.values(rawData) : []);
            const newUser = { 
                id: devId, 
                ID: devId,
                username: document.getElementById('field_username').value || "User",
                key: document.getElementById('field_password').value || "123",
                password: document.getElementById('field_password').value || "123",
                expiresAt: expVal,
                Expiry: formatDateToDMY(expVal),
                allowOffline: document.getElementById('field_offline').value === 'true'
            };
            if (editingIndex !== -1) users[editingIndex] = newUser; 
            else users.push(newUser);
            dataToSave = users;
        }

        // PENTING: Gunakan await agar Firebase verifikasi Auth Abang
        await db.ref(currentPath).set(dataToSave);
        
        showToast("User Berhasil Diupdate!");
        clearForm();
    } catch (e) {
        console.error(e);
        showToast("Gagal Edit: " + e.message, "error");
    }
}


        async function saveGlobalConfig() {
            let data = rawData || { Users: [] }; 
            data.AdminUrl = document.getElementById('cfg_adminUrl').value;
            data.Marquee = document.getElementById('cfg_marquee').value;
            try {
                await db.ref(currentPath).set(data);
                showToast("Config Global Diupdate");
            } catch (e) { showToast("Gagal Update", "error"); }
        }

        function editUser(index) {
            let usersArr = (currentPath === "autologin") ? rawData.Users : (Array.isArray(rawData) ? rawData : Object.values(rawData));
            const u = usersArr[index];
            editingIndex = index;
            document.getElementById('formTitle').innerText = "Update User";
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('field_id').value = u.id || u.ID;
            document.getElementById('field_username').value = u.username || '';
            document.getElementById('field_password').value = u.key || u.password || '';
            document.getElementById('field_offline').value = String(u.allowOffline || 'false');
            document.getElementById('field_expiry').value = currentPath === "autologin" ? formatDateToYMD(u.Expiry) : u.expiresAt;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteUser(index) {
            deleteIndexTarget = index;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = executeDelete;
        }

        async function executeDelete() {
            let usersArray = (currentPath === "autologin") ? [...rawData.Users] : (Array.isArray(rawData) ? [...rawData] : Object.values(rawData));
            usersArray.splice(deleteIndexTarget, 1);
            let dataToSave = (currentPath === "autologin") ? { ...rawData, Users: usersArray } : usersArray;
            await db.ref(currentPath).set(dataToSave);
            closeConfirm();
            showToast("User Dihapus", "error");
        }

        function loadAdminList() {
            db.ref('AdminAccount').on('value', (snapshot) => {
                const data = snapshot.val();
                const list = document.getElementById('adminList');
                list.innerHTML = '';
                let admins = Array.isArray(data) ? data : (data ? Object.values(data) : []);
                admins.forEach((admin, index) => {
                    if(!admin) return;
                    const isSuper = admin.email === SUPER_ADMIN_EMAIL;
                    list.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between items-center border ${isSuper ? 'border-amber-500/30' : 'border-white/5'}">
                        <div><p class="text-[10px] font-black text-white uppercase italic">${admin.email} ${isSuper ? '⭐' : ''}</p><p class="text-[9px] text-slate-500">Pass: ${admin.pass}</p></div>
                        ${!isSuper ? `<button onclick="confirmDeleteAdmin(${index})" class="w-8 h-8 bg-red-500/10 text-red-400 rounded-lg"><i class="fa-solid fa-user-minus text-xs"></i></button>` : ''}
                    </div>`;
                });
            });
        }

        async function saveAdmin() {
    const email = document.getElementById('newAdminEmail').value.trim();
    const pass = document.getElementById('newAdminPass').value.trim();
    
    if(!email || !pass) return showToast("Isi Email & Pass!", "error");

    try {
        // 1. DAFTARKAN KE AUTH (Pintu Belakang biar Abang GAK LOGOUT)
        const secondaryApp = firebase.initializeApp(firebaseConfig, "SecondaryRegistration");
        try {
            await secondaryApp.auth().createUserWithEmailAndPassword(email, pass);
            await secondaryApp.delete();
        } catch (authErr) {
            console.log("Email sudah ada di Auth.");
            await secondaryApp.delete();
        }

        // 2. SIMPAN KE DATABASE (Folder AdminAccount)
        const snapshot = await db.ref('AdminAccount').once('value');
        let admins = snapshot.val();
        if (!Array.isArray(admins)) admins = admins ? Object.values(admins) : [];
        
        const idx = admins.findIndex(a => a && a.email === email);
        if(idx > -1) admins[idx].pass = pass; else admins.push({ email, pass });
        
        await db.ref('AdminAccount').set(admins);
        
        showToast("Admin Berhasil Disinkronkan!");
    } catch (e) {
        showToast("Gagal: " + e.message, "error");
    }
}




        function confirmDeleteAdmin(index) {
    deleteIndexTarget = index;
    document.getElementById('confirmModal').classList.remove('hidden');
    
    // Set ulang fungsi klik tombol hapus di modal
    document.getElementById('finalDeleteBtn').onclick = async () => {
        try {
            const adminRef = db.ref('AdminAccount');
            const snapshot = await adminRef.once('value');
            let admins = snapshot.val();

            // Pastikan data diproses sebagai Array agar .splice tidak error
            if (!Array.isArray(admins)) {
                admins = admins ? Object.values(admins) : [];
            }

            const targetEmail = admins[deleteIndexTarget].email;

            // Proteksi: Jangan biarkan Super Admin terhapus secara tidak sengaja
            if (targetEmail === SUPER_ADMIN_EMAIL) {
                closeConfirm();
                return showToast("Super Admin tidak bisa dihapus!", "error");
            }

            // Proses hapus dari list
            admins.splice(deleteIndexTarget, 1);

            // Simpan kembali data yang sudah dikurangi ke Firebase
            await adminRef.set(admins);
            
            closeConfirm();
            showToast("Admin Berhasil Dihapus!", "error");
            
            // List akan otomatis terupdate karena kita pakai .on('value')
        } catch (e) {
            console.error("Gagal Hapus:", e);
            showToast("Gagal: " + e.message, "error");
        }
    };
}



        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }

            editingIndex = -1; document.getElementById('formTitle').innerText = "Tambah User";

            document.getElementById('field_password').value = ''; document.getElementById('field_expiry').value = '';

        function showToast(m, t='success') {
            const c = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${t==='error'?'border-red-500':'border-emerald-500'}`;
            toast.innerHTML = m; c.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        function formatDateToDMY(d) { if(!d.includes('-')) return d; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
        function formatDateToYMD(d) { if(!d.includes('/')) return d; const [day,m,y]=d.split('/'); return `${y}-${m}-${day}`; }
