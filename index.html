<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Firebase Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center">
        <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Smart Admin</h1>
        <p class="text-[10px] opacity-70 tracking-[0.4em] uppercase mt-1">New Edition • Powered By TKS</p>
    </div>

    <div class="max-w-md mx-auto px-4">
        <div class="bg-slate-900/80 backdrop-blur-md p-6 rounded-3xl border border-white/5 mb-6 shadow-xl">
            <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Pilih Lock</label>
            <select id="lockSelector" onchange="switchDatabase()" class="w-full p-4 bg-slate-800 rounded-2xl font-bold text-sm border border-slate-600 text-white outline-none focus:border-blue-500 transition">
                <option value="lock1">Lock Password</option>
                <option value="lock2">Lock Pass & Username</option>
                <option value="autologin">Lock Autologin (JSON)</option>
            </select>
        </div>

        <div id="configArea" class="hidden bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-blue-500 border border-white/5">
            <h2 class="text-blue-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-gears mr-2"></i> Global Config
            </h2>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Admin URL</label>
                    <input type="text" id="cfg_adminUrl" placeholder="https://t.me/..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Marquee Message</label>
                    <textarea id="cfg_marquee" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none h-20"></textarea>
                </div>
                <button onclick="saveGlobalConfig()" class="w-full bg-blue-600 text-white p-3 rounded-xl font-bold text-[10px] uppercase shadow-lg active:scale-95 transition">Update Global Info</button>
            </div>
        </div>

        <div id="userEditorArea" class="bg-slate-900 p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-emerald-500 border border-white/5">
            <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                <i class="fa-solid fa-user-plus mr-2"></i> Edit User
            </h2>
            
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Device ID</label>
                    <input type="text" id="field_id" placeholder="Contoh: a880d1..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none shadow-inner">
                </div>
                <div id="usernameContainer" class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Username</label>
                    <input type="text" id="field_username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div id="passwordContainer" class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Password / Key</label>
                    <input type="text" id="field_password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Expires Date</label>
                    <input type="text" id="field_expiry" placeholder="DD/MM/YYYY atau YYYY-MM-DD" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white focus:border-blue-500 outline-none">
                </div>
                <div id="offlineContainer" class="flex items-center justify-between p-4 bg-slate-800/50 border border-slate-700 rounded-2xl">
                    <label class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Allow Offline</label>
                    <select id="field_offline" class="bg-indigo-600 text-white text-[10px] font-black rounded-lg px-3 py-1 outline-none">
                        <option value="true">TRUE</option>
                        <option value="false">FALSE</option>
                    </select>
                </div>
            </div>

            <button onclick="saveUser()" id="btnSave" class="w-full mt-8 bg-emerald-600 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-lg active:scale-95 transition">
                Simpan User
            </button>
        </div>

        <div class="relative mb-6">
            <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
            <input type="text" id="searchInput" onkeyup="filterUser()" placeholder="Cari ID atau Username..." class="w-full p-5 pl-14 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm focus:border-blue-500 shadow-xl">
        </div>

        <div id="userList" class="space-y-4"></div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPath = "lock2"; 
        let fullRawData = null; // Menyimpan objek utuh dari Firebase

        window.onload = () => {
            document.getElementById('lockSelector').value = "lock2";
            switchDatabase();
        };

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            
            const uContainer = document.getElementById('usernameContainer');
            const pContainer = document.getElementById('passwordContainer');
            const oContainer = document.getElementById('offlineContainer');
            const cArea = document.getElementById('configArea');

            // Reset UI
            uContainer.classList.remove('hidden');
            pContainer.classList.remove('hidden');
            oContainer.classList.remove('hidden');
            cArea.classList.add('hidden');

            if(currentPath === "lock1") {
                uContainer.classList.add('hidden');
            } else if (currentPath === "autologin") {
                uContainer.classList.add('hidden');
                pContainer.classList.add('hidden');
                oContainer.classList.add('hidden');
                cArea.classList.remove('hidden');
            }
            
            loadFirebaseData();
        }

        function loadFirebaseData() {
            const list = document.getElementById('userList');
            db.ref(currentPath).on('value', (snapshot) => {
                fullRawData = snapshot.val();
                list.innerHTML = ''; 

                if (!fullRawData) {
                    list.innerHTML = '<div class="text-center opacity-30 text-xs py-10 uppercase font-bold tracking-widest">Database Kosong</div>';
                    return;
                }

                let usersArray = [];
                if (currentPath === "autologin") {
                    usersArray = fullRawData.Users || [];
                    document.getElementById('cfg_adminUrl').value = fullRawData.AdminUrl || "";
                    document.getElementById('cfg_marquee').value = fullRawData.Marquee || "";
                } else {
                    usersArray = Array.isArray(fullRawData) ? fullRawData : Object.values(fullRawData);
                }

                usersArray.forEach((u, index) => {
                    if(!u) return;
                    const displayName = u.username || u.ID || u.id;
                    const displayExp = u.Expiry || u.expiresAt || "---";

                    list.innerHTML += `
                        <div class="bg-slate-900/60 p-5 rounded-[2.5rem] border border-white/5 shadow-lg mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="font-black text-white italic uppercase">${displayName}</div>
                                <div class="flex gap-2">
                                    <button onclick="editUser(${index})" class="w-9 h-9 bg-blue-500/10 text-blue-400 rounded-xl border border-blue-500/20"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="deleteUser(${index})" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl border border-red-500/20"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl space-y-1 text-[10px]">
                                <div class="flex justify-between"> <span class="opacity-50">ID</span> <span class="text-blue-300 font-bold">${u.id || u.ID}</span> </div>
                                <div class="flex justify-between"> <span class="opacity-50">EXP</span> <span class="text-amber-400 font-bold">${displayExp}</span> </div>
                            </div>
                        </div>`;
                });
            });
        }

        async function saveUser() {
            const deviceId = document.getElementById('field_id').value;
            if(!deviceId) return alert("ID Device wajib diisi!");

            if (currentPath === "autologin") {
                // Logika Autologin
                if (!fullRawData) fullRawData = { AdminUrl: "", Marquee: "", Users: [] };
                if (!fullRawData.Users) fullRawData.Users = [];

                const newUser = {
                    ID: deviceId,
                    Expiry: document.getElementById('field_expiry').value
                };

                const existingIndex = fullRawData.Users.findIndex(u => u && u.ID === deviceId);
                if (existingIndex !== -1) {
                    fullRawData.Users[existingIndex] = newUser;
                } else {
                    fullRawData.Users.push(newUser);
                }
            } else {
                // Logika Lock 1 & 2
                let usersArray = Array.isArray(fullRawData) ? fullRawData : (fullRawData ? Object.values(fullRawData) : []);
                
                const newUser = {
                    id: deviceId,
                    password: document.getElementById('field_password').value,
                    key: document.getElementById('field_password').value,
                    expiresAt: document.getElementById('field_expiry').value,
                    allowOffline: document.getElementById('field_offline').value === 'true'
                };
                if(currentPath === "lock2") newUser.username = document.getElementById('field_username').value || "User";

                const existingIndex = usersArray.findIndex(u => u && u.id === deviceId);
                if (existingIndex !== -1) usersArray[existingIndex] = newUser;
                else usersArray.push(newUser);
                
                fullRawData = usersArray;
            }

            try {
                await db.ref(currentPath).set(fullRawData);
                alert("Berhasil disimpan!");
                clearForm();
            } catch (e) { alert("Gagal: " + e.message); }
        }

        async function saveGlobalConfig() {
            if (currentPath !== "autologin") return;
            const updates = {
                AdminUrl: document.getElementById('cfg_adminUrl').value,
                Marquee: document.getElementById('cfg_marquee').value
            };
            try {
                await db.ref(currentPath).update(updates);
                alert("Global Config diperbarui!");
            } catch (e) { alert("Gagal: " + e.message); }
        }

        function editUser(index) {
            let u;
            if (currentPath === "autologin") {
                u = fullRawData.Users[index];
                document.getElementById('field_id').value = u.ID;
                document.getElementById('field_expiry').value = u.Expiry;
            } else {
                const usersArray = Array.isArray(fullRawData) ? fullRawData : Object.values(fullRawData);
                u = usersArray[index];
                document.getElementById('field_id').value = u.id;
                document.getElementById('field_username').value = u.username || '';
                document.getElementById('field_password').value = u.key || u.password || '';
                document.getElementById('field_expiry').value = u.expiresAt || '';
                document.getElementById('field_offline').value = u.allowOffline ? u.allowOffline.toString() : 'false';
            }
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function deleteUser(index) {
            if(!confirm("Hapus user ini?")) return;
            if (currentPath === "autologin") {
                fullRawData.Users.splice(index, 1);
            } else {
                let usersArray = Array.isArray(fullRawData) ? fullRawData : Object.values(fullRawData);
                usersArray.splice(index, 1);
                fullRawData = usersArray;
            }
            db.ref(currentPath).set(fullRawData);
        }

        function clearForm() {
            document.getElementById('field_id').value = '';
            document.getElementById('field_username').value = '';
            document.getElementById('field_password').value = '';
            document.getElementById('field_expiry').value = '';
        }

        function filterUser() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#userList > div').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
