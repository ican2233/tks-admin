<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 14px 24px;
            border-radius: 18px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); margin-bottom: 10px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; border-left: 5px solid #10b981;
            animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div id="toast-container"></div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-shield-halved text-2xl text-white"></i>
                </div>
                <h2 class="text-xl font-black italic uppercase tracking-tighter">Admin Login</h2>
                <p class="text-[9px] opacity-50 uppercase tracking-[0.3em]">Restricted Access</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Admin" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-black text-xs uppercase transition shadow-lg">Login System</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center relative">
            <button onclick="handleLogout()" class="absolute right-6 top-6 text-white/50 hover:text-white transition">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
            <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Smart Admin</h1>
            <p class="text-[10px] opacity-70 tracking-[0.4em] uppercase mt-1">Fix Edition • Clean & Key Only</p>
        </div>

        <div class="max-w-md mx-auto px-4">
            <div class="glass-card p-6 rounded-3xl mb-6 shadow-xl relative overflow-hidden">
                <div class="flex justify-between items-end mb-4">
                    <div class="w-2/3">
                        <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Mode Database</label>
                        <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-3 rounded-xl font-bold text-xs border border-slate-600 text-white outline-none focus:border-blue-500 transition">
                            <option value="lock1">Lock Password (Key Only)</option>
                            <option value="lock2" selected>Lock Pass & Username</option>
                            <option value="autologin">Lock Auto Login</option>
                        </select>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] text-slate-500 font-bold uppercase tracking-tighter">Total User</p>
                        <p id="totalUserCounter" class="text-3xl font-black text-white italic leading-none">0</p>
                    </div>
                </div>
                <div class="w-full bg-slate-900 h-1.5 rounded-full overflow-hidden">
                    <div id="progressBar" class="bg-blue-500 h-full transition-all duration-700 shadow-[0_0_10px_#3b82f6]" style="width: 0%"></div>
                </div>
            </div>

            <div id="userEditorArea" class="glass-card p-6 rounded-[2.5rem] shadow-2xl mb-8 border-l-8 border-emerald-500 transition-all duration-500">
                <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                    <i class="fa-solid fa-user-plus mr-2"></i> Tambah User
                </h2>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Device ID</label>
                        <input type="text" id="field_id" placeholder="ID Device..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none focus:border-emerald-500">
                    </div>
                    <div id="usernameContainer" class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Username</label>
                        <input type="text" id="field_username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none">
                    </div>
                    <div id="passwordContainer" class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Password / Key</label>
                        <input type="text" id="field_password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[9px] text-slate-500 font-bold uppercase ml-2">Expires Date</label>
                        <input type="date" id="field_expiry" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm text-white outline-none">
                    </div>
                    <div id="offlineContainer" class="flex items-center justify-between p-4 bg-slate-800/50 border border-slate-700 rounded-2xl">
                        <label class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Allow Offline</label>
                        <select id="field_offline" class="bg-indigo-600 text-white text-[10px] font-black rounded-lg px-3 py-1 outline-none">
                            <option value="true">TRUE</option>
                            <option value="false">FALSE</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2 mt-8">
                    <button id="cancelBtn" onclick="clearForm()" class="hidden flex-1 bg-slate-700 hover:bg-slate-600 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-lg transition">Batal</button>
                    <button id="submitBtn" onclick="saveUser()" class="flex-[2] bg-emerald-600 hover:bg-emerald-500 text-white p-5 rounded-2xl font-black text-xs uppercase shadow-lg active:scale-95 transition">Simpan User</button>
                </div>
            </div>

            <div class="relative mb-6">
                <i class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="searchInput" onkeyup="filterUser()" placeholder="Cari ID atau Username..." class="w-full p-5 pl-14 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm focus:border-blue-500 shadow-xl text-white">
            </div>

            <div id="userList" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = { 
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            apiKey: "AIzaSy..." // MASUKKAN API KEY KAMU DISINI AGAR LOGIN JALAN
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        
        let currentPath = "lock2"; 
        let rawData = null; 
        let editingIndex = -1;

        // AUTH CHECK
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                switchDatabase();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
            }
        });

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                showToast("Login Berhasil");
            } catch (e) { showToast("Login Gagal: " + e.message, "error"); }
        }

        function handleLogout() { auth.signOut(); }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'error' ? 'border-red-500' : 'border-emerald-500'}`;
            toast.innerHTML = `<i class="fa-solid ${type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'} mr-3 text-lg"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            document.getElementById('usernameContainer').classList.toggle('hidden', currentPath === "lock1" || currentPath === "autologin");
            document.getElementById('passwordContainer').classList.toggle('hidden', currentPath === "autologin");
            document.getElementById('offlineContainer').classList.toggle('hidden', currentPath === "autologin");
            clearForm(); 
            loadFirebaseData();
        }

        function loadFirebaseData() {
            const list = document.getElementById('userList');
            db.ref(currentPath).on('value', (snapshot) => {
                rawData = snapshot.val();
                list.innerHTML = ''; 
                if (!rawData) {
                    document.getElementById('totalUserCounter').innerText = "0";
                    list.innerHTML = '<div class="text-center opacity-30 text-xs py-10 uppercase font-bold tracking-widest">Database Kosong</div>';
                    return;
                }

                let usersArray = (currentPath === "autologin") ? (rawData.Users || []) : (Array.isArray(rawData) ? rawData : Object.values(rawData));
                document.getElementById('totalUserCounter').innerText = usersArray.filter(u => u !== null).length;

                usersArray.forEach((u, index) => {
                    if(!u) return;
                    const name = u.username || u.ID || u.id || "Unknown";
                    list.innerHTML += `
                        <div class="glass-card p-5 rounded-[2.5rem] shadow-lg mb-4">
                            <div class="flex justify-between items-center mb-3">
                                <div class="font-black text-white italic uppercase text-sm truncate pr-4">${name}</div>
                                <div class="flex gap-2">
                                    <button onclick="editUser(${index})" class="w-9 h-9 bg-blue-500/10 text-blue-400 rounded-xl border border-blue-500/20 hover:bg-blue-500 transition"><i class="fa-solid fa-pen text-xs"></i></button>
                                    <button onclick="deleteUser(${index})" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl border border-red-500/20 hover:bg-red-500 transition"><i class="fa-solid fa-trash text-xs"></i></button>
                                </div>
                            </div>
                            <div class="bg-black/40 p-4 rounded-2xl text-[10px] space-y-1">
                                <div class="flex justify-between"> <span class="opacity-40 uppercase">ID</span> <span class="text-blue-300 font-bold">${u.id || u.ID}</span> </div>
                                <div class="flex justify-between border-t border-white/5 pt-1 mt-1"> <span class="opacity-40 uppercase">Key</span> <span class="text-indigo-400 font-bold">${u.key || u.password || "-"}</span> </div>
                                <div class="flex justify-between border-t border-white/5 pt-1 mt-1"> <span class="opacity-40 uppercase">Exp</span> <span class="text-amber-400 font-bold">${u.Expiry || u.expiresAt || "-"}</span> </div>
                            </div>
                        </div>`;
                });
            });
        }

        async function saveUser() {
            const devId = document.getElementById('field_id').value;
            const expVal = document.getElementById('field_expiry').value;
            const keyVal = document.getElementById('field_password').value;
            if(!devId || !expVal) return showToast("ID & Tanggal Wajib!", "error");

            try {
                let dataToSave;
                if (currentPath === "autologin") {
                    const snap = await db.ref(currentPath).once('value');
                    let data = snap.val() || { Users: [] };
                    const newUser = { ID: devId, Expiry: formatDateToDMY(expVal) };
                    if (editingIndex !== -1) data.Users[editingIndex] = newUser; else data.Users.push(newUser);
                    dataToSave = data;
                } else {
                    let users = Array.isArray(rawData) ? [...rawData] : (rawData ? Object.values(rawData) : []);
                    const newUser = {
                        id: devId, 
                        key: keyVal, // HANYA PAKAI KEY SESUAI PERMINTAAN
                        expiresAt: expVal,
                        allowOffline: document.getElementById('field_offline').value === 'true'
                    };
                    if(currentPath === "lock2") newUser.username = document.getElementById('field_username').value || "User";
                    if (editingIndex !== -1) users[editingIndex] = newUser; else users.push(newUser);
                    dataToSave = users;
                }
                await db.ref(currentPath).set(dataToSave);
                showToast("Berhasil Disimpan");
                clearForm();
            } catch (e) { showToast("Gagal Simpan", "error"); }
        }

        function deleteUser(index) {
            let usersArray = (currentPath === "autologin") ? [...rawData.Users] : (Array.isArray(rawData) ? [...rawData] : Object.values(rawData));
            usersArray.splice(index, 1);
            
            let dataToSave = (currentPath === "autologin") ? { ...rawData, Users: usersArray } : usersArray;
            db.ref(currentPath).set(dataToSave);
            showToast("User Terhapus", "error");
        }

        // Utils (formatDate, clearForm, editUser, filterUser sama seperti sebelumnya dengan fix kecil)
        function formatDateToDMY(d) { if(!d.includes('-')) return d; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
        function formatDateToYMD(d) { if(!d.includes('/')) return d; const [day,m,y]=d.split('/'); return `${y}-${m}-${day}`; }

        function editUser(index) {
            let usersArray = (currentPath === "autologin") ? rawData.Users : (Array.isArray(rawData) ? rawData : Object.values(rawData));
            const u = usersArray[index];
            editingIndex = index;
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-pen-to-square mr-2"></i> Update User';
            document.getElementById('userEditorArea').classList.replace('border-emerald-500', 'border-blue-500');
            document.getElementById('submitBtn').classList.replace('bg-emerald-600', 'bg-blue-600');
            document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('field_id').value = u.id || u.ID;
            document.getElementById('field_username').value = u.username || '';
            document.getElementById('field_password').value = u.key || u.password || '';
            document.getElementById('field_expiry').value = currentPath === "autologin" ? formatDateToYMD(u.Expiry) : u.expiresAt;
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function clearForm() {
            editingIndex = -1;
            document.getElementById('formTitle').innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i> Tambah User';
            document.getElementById('userEditorArea').classList.add('border-emerald-500');
            document.getElementById('userEditorArea').classList.remove('border-blue-500');
            document.getElementById('submitBtn').classList.add('bg-emerald-600');
            document.getElementById('submitBtn').classList.remove('border-blue-500');
            document.getElementById('cancelBtn').classList.add('hidden');
            document.getElementById('field_id').value = '';
            document.getElementById('field_username').value = '';
            document.getElementById('field_password').value = '';
            document.getElementById('field_expiry').value = '';
        }

        function filterUser() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('#userList > div').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
