<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>

    <div id="loginScreen">...</div>
    <div id="mainContent" class="hidden">...</div>

    <script>
        // 1. Konfigurasi
        const firebaseConfig = { databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com" };
        
        // 2. Inisialisasi
        firebase.initializeApp(firebaseConfig);

        // 3. Wrapper untuk memastikan Auth selalu tersedia
        const getAuth = () => firebase.auth();
        const getDb = () => firebase.database();

        // 4. Listener State (Gunakan ini untuk kontrol UI)
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                console.log("User logged in:", user.email);
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainContent').style.display = 'none';
            }
        });

        // 5. Perbaikan fungsi Login (Menggunakan wrapper getAuth)
        async function checkAdminLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            try {
                // Memanggil getAuth() memastikan kita mengambil instance terbaru
                await getAuth().signInWithEmailAndPassword(email, pass);
            } catch (e) {
                alert("Login Gagal: " + e.message);
            }
        }

        function doLogout() {
            getAuth().signOut();
        }
    </script>
</body>
</html>
