<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM | Ultra Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .input-style { width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3); border: 1px solid #334155; border-radius: 16px; font-size: 14px; outline: none; transition: 0.2s; color: white; }
        .input-style:focus { border-color: #3b82f6; }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: #1e293b; border-left: 4px solid #3b82f6; color: white; padding: 15px 25px; border-radius: 15px; margin-bottom: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="toast-container"></div>

    <div id="confirmModal" class="hidden fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs text-center border-t-4 border-red-500">
            <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-triangle-exclamation text-2xl"></i></div>
            <h3 class="text-white font-extrabold uppercase italic">Konfirmasi</h3>
            <p class="text-slate-400 text-[11px] mt-2 mb-6">Hapus data ini secara permanen?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-xl font-bold text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-xl font-bold text-[10px] uppercase">Hapus</button>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <header class="bg-gradient-to-br from-blue-700 to-indigo-900 p-10 rounded-b-[3.5rem] shadow-2xl relative border-b border-white/10">
            <div class="text-center">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">TKS TEAM ADMIN</h1>
                <p id="roleDisplay" class="text-[9px] font-bold text-blue-200/60 mt-2 tracking-widest uppercase">suwandiikhsan1@gmail.com (SUPER ADMIN)</p>
            </div>
        </header>

        <main class="max-w-md mx-auto px-6 -mt-8">
            <div class="flex p-2 bg-slate-900/50 backdrop-blur rounded-2xl mb-6 border border-white/5">
                <button class="flex-1 py-3 rounded-xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg">User Management</button>
                <button class="flex-1 py-3 rounded-xl text-slate-400 text-[10px] font-black uppercase italic">Admin Settings</button>
            </div>

            <section id="usersTab">
                <div class="glass-card p-6 rounded-[2rem] mb-6">
                    <div class="flex justify-between items-center mb-6">
                        <div class="w-3/5">
                            <label class="text-[8px] font-black uppercase text-blue-400 tracking-widest block mb-2">Database Mode</label>
                            <select id="dbMode" onchange="switchDB()" class="w-full bg-slate-800 text-xs font-bold p-3 rounded-xl border border-slate-700 outline-none text-white">
                                <option value="lock1">LOCK PASSWORD</option>
                                <option value="lock2" selected>LOCK USER & PASS</option>
                                <option value="autologin">AUTO LOGIN</option>
                            </select>
                        </div>
                        <div class="text-right flex items-center gap-3">
                            <div class="flex gap-1">
                                <button onclick="backupData()" class="w-8 h-8 bg-blue-500/20 text-blue-400 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cloud-arrow-down text-[10px]"></i></button>
                                <button onclick="document.getElementById('fileRestore').click()" class="w-8 h-8 bg-emerald-500/20 text-emerald-400 rounded-lg flex items-center justify-center"><i class="fa-solid fa-cloud-arrow-up text-[10px]"></i></button>
                                <input type="file" id="fileRestore" class="hidden" accept=".json" onchange="restoreData(this)">
                            </div>
                            <div>
                                <span class="text-[8px] font-black text-slate-500 uppercase block text-right">Total</span>
                                <span id="userCount" class="text-4xl font-black text-white italic leading-none">0</span>
                            </div>
                        </div>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="userSearch" onkeyup="renderUserList()" placeholder="Cari nama atau ID..." class="w-full p-3 pl-10 bg-black/40 border border-slate-700 rounded-xl text-xs outline-none text-white">
                    </div>
                </div>

                <div id="userForm" class="glass-card p-6 rounded-[2rem] mb-8 border-l-4 border-emerald-500">
                    <h3 id="formTitle" class="text-emerald-400 font-black text-[10px] uppercase tracking-widest mb-6 flex items-center"><i class="fa-solid fa-user-plus mr-2"></i> Tambah User Baru</h3>
                    <div class="space-y-4">
                        <input type="text" id="in_id" placeholder="ID Device" class="input-style">
                        <div id="wrap_user"><input type="text" id="in_user" placeholder="Username" class="input-style"></div>
                        <div id="wrap_pass"><input type="text" id="in_pass" placeholder="Password / Key" class="input-style"></div>
                        <input type="date" id="in_exp" class="input-style">
                        <div id="wrap_offline">
                            <select id="in_offline" class="input-style">
                                <option value="true">ALLOW OFFLINE: TRUE</option>
                                <option value="false">ALLOW OFFLINE: FALSE</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8">
                        <button id="btn-cancel" onclick="resetForm()" class="hidden flex-1 bg-slate-700 p-4 rounded-xl font-bold text-[10px] uppercase">Batal</button>
                        <button id="btn-submit" onclick="submitUser()" class="flex-[2] bg-emerald-600 p-4 rounded-xl font-bold text-[10px] uppercase shadow-lg">Simpan User</button>
                    </div>
                </div>

                <div id="userList" class="space-y-4"></div>
            </section>
        </main>
    </div>

    <script>
        // Ganti Config sesuai Firebase milikmu
        const firebaseConfig = {
            apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
            authDomain: "admin-panel-tks.firebaseapp.com",
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            projectId: "admin-panel-tks",
            storageBucket: "admin-panel-tks.firebasestorage.app",
            messagingSenderId: "543562286942",
            appId: "1:543562286942:web:8ba8d50b09610c9d1331cf"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentMode = "lock2";
        let cachedData = null;
        let editIdx = -1;

        function switchDB() {
            currentMode = document.getElementById('dbMode').value;
            const isAuto = currentMode === 'autologin';
            const isLock1 = currentMode === 'lock1';

            // Sembunyikan field yang tidak perlu
            document.getElementById('wrap_user').classList.toggle('hidden', isAuto || isLock1);
            document.getElementById('wrap_pass').classList.toggle('hidden', isAuto);
            document.getElementById('wrap_offline').classList.toggle('hidden', isAuto);
            
            resetForm();
            db.ref(currentMode).on('value', (snap) => { 
                cachedData = snap.val(); 
                renderUserList(); 
            });
        }

        function renderUserList() {
            const container = document.getElementById('userList');
            const search = document.getElementById('userSearch').value.toLowerCase();
            container.innerHTML = "";
            
            let items = (currentMode === 'autologin') ? (cachedData?.Users || []) : (Array.isArray(cachedData) ? cachedData : (cachedData ? Object.values(cachedData) : []));
            let count = 0;

            items.forEach((u, i) => {
                if (!u) return;

                // LOGIKA PEMBACAAN DATABASE (Ngebaca Tiap Tipe Database)
                let displayTitle = "";
                let displaySub = "";

                if (currentMode === "lock2") {
                    displayTitle = u.username || "No Name";
                    displaySub = `ID: ${u.id || 'N/A'}`;
                } else if (currentMode === "lock1") {
                    displayTitle = u.id || "Unknown ID";
                    displaySub = `Key: ${u.password || u.key || 'N/A'}`;
                } else if (currentMode === "autologin") {
                    displayTitle = u.ID || "Auto Device";
                    displaySub = `Expiry: ${u.Expiry || 'N/A'}`;
                }

                // Filter Pencarian
                if (search && !displayTitle.toLowerCase().includes(search) && !displaySub.toLowerCase().includes(search)) return;
                
                count++;
                container.innerHTML += `
                    <div class="glass-card p-5 rounded-3xl relative border-l-4 border-slate-600">
                        <div class="flex justify-between items-center">
                            <div>
                                <h4 class="text-white font-extrabold italic uppercase text-sm">${displayTitle}</h4>
                                <p class="text-[9px] text-slate-500 font-bold uppercase tracking-widest mt-1">${displaySub}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editUser(${i})" class="w-9 h-9 bg-blue-500/10 text-blue-400 rounded-xl flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="triggerDelete(${i})" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl flex items-center justify-center"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('userCount').innerText = count;
        }

        async function submitUser() {
            const id = document.getElementById('in_id').value.trim();
            const exp = document.getElementById('in_exp').value;
            if (!id || !exp) return showToast("Lengkapi form!", "error");

            let toSave;
            if (currentMode === 'autologin') {
                let base = cachedData || { Users: [] };
                const obj = { ID: id, Expiry: dmy(exp) };
                if (editIdx > -1) base.Users[editIdx] = obj; else base.Users.push(obj);
                toSave = base;
            } else {
                let list = Array.isArray(cachedData) ? [...cachedData] : (cachedData ? Object.values(cachedData) : []);
                const obj = { 
                    id: id, 
                    expiresAt: exp, 
                    key: document.getElementById('in_pass').value, 
                    password: document.getElementById('in_pass').value, 
                    allowOffline: document.getElementById('in_offline').value === "true" 
                };
                if (currentMode === 'lock2') obj.username = document.getElementById('in_user').value || "User";
                if (editIdx > -1) list[editIdx] = obj; else list.push(obj);
                toSave = list;
            }
            await db.ref(currentMode).set(toSave);
            showToast("Success"); resetForm();
        }

        function editUser(i) {
            let items = (currentMode === 'autologin') ? cachedData.Users : (Array.isArray(cachedData) ? cachedData : Object.values(cachedData));
            const u = items[i]; editIdx = i;
            document.getElementById('formTitle').innerText = "Update User";
            document.getElementById('btn-cancel').classList.remove('hidden');
            document.getElementById('in_id').value = u.id || u.ID;
            document.getElementById('in_user').value = u.username || "";
            document.getElementById('in_pass').value = u.key || u.password || "";
            document.getElementById('in_offline').value = String(u.allowOffline);
            document.getElementById('in_exp').value = (currentMode === 'autologin') ? ymd(u.Expiry) : u.expiresAt;
        }

        function triggerDelete(i) {
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = async () => {
                let items = (currentMode === 'autologin') ? [...cachedData.Users] : (Array.isArray(cachedData) ? [...cachedData] : Object.values(cachedData));
                items.splice(i, 1);
                await db.ref(currentMode).set((currentMode === 'autologin') ? { ...cachedData, Users: items } : items);
                closeConfirm(); showToast("Terhapus", "error");
            };
        }

        function backupData() {
            if (!cachedData) return showToast("Data Kosong", "error");
            const blob = new Blob([JSON.stringify(cachedData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `Backup_${currentMode}.json`; a.click();
        }

        function restoreData(input) {
            const file = input.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    await db.ref(currentMode).set(json);
                    showToast("Restore Berhasil");
                } catch (err) { showToast("File Rusak", "error"); }
            };
            reader.readAsText(file);
        }

        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
        function showToast(m, t='success') { const c = document.getElementById('toast-container'); const toast = document.createElement('div'); toast.className = `toast ${t==='error'?'border-red-500':'border-blue-500'}`; toast.innerHTML = m; c.appendChild(toast); setTimeout(() => toast.remove(), 2500); }
        function resetForm() { editIdx = -1; document.getElementById('formTitle').innerText = "Tambah User Baru"; document.getElementById('btn-cancel').classList.add('hidden'); ['in_id','in_user','in_pass','in_exp'].forEach(id => document.getElementById(id).value = ""); }
        function dmy(s) { if(!s || !s.includes('-')) return s; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }
        function ymd(s) { if(!s || !s.includes('/')) return s; const [d,m,y] = s.split('/'); return `${y}-${m}-${d}`; }

        // Jalankan awal
        switchDB();
    </script>
</body>
</html>
