<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(8px); color: white; padding: 14px 24px;
            border-radius: 18px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); margin-bottom: 10px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; border-left: 5px solid #10b981;
            animation: slideIn 0.3s ease-out, fadeOut 0.3s ease-in 2.5s forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        .hidden { display: none !important; }
        .btn-action { transition: all 0.2s ease; }
        .btn-action:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div id="toast-container"></div>

    <div id="confirmModal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs border-t-4 border-red-500 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-500/20 text-red-500 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-trash-can text-2xl"></i>
            </div>
            <h3 class="text-white font-black uppercase italic mb-2 text-sm">Hapus Data?</h3>
            <p class="text-slate-400 text-[10px] mb-8 leading-tight">Tindakan ini permanen.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-2xl font-black text-[10px] uppercase">Hapus</button>
            </div>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/20">
                    <i class="fa-solid fa-user-shield text-2xl text-white"></i>
                </div>
                <h2 class="text-xl font-black italic uppercase tracking-tighter">Admin Access</h2>
                <p class="text-[9px] text-slate-500 font-bold uppercase mt-1">TKS TEAM Secure Protocol</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Admin" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500 transition-all">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none focus:border-blue-500 transition-all">
                <button onclick="checkAdminLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-4 rounded-2xl font-black text-xs uppercase transition-all shadow-lg active:scale-95">Login System</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl mb-6 rounded-b-[3rem] border-b border-white/10 text-center relative">
            <button onclick="doLogout()" class="absolute right-6 top-6 text-white/50 hover:text-white transition">
                <i class="fa-solid fa-power-off"></i>
            </button>
            <h1 class="text-2xl font-black tracking-tighter italic text-white uppercase">TKS TEAM Admin</h1>
        </div>

        <div class="max-w-md mx-auto px-4">
            
            <div id="adminTabNav" class="hidden flex gap-2 mb-6">
                <button onclick="switchTab('users')" id="tab-users" class="flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg transition-all">User Management</button>
                <button onclick="switchTab('admins')" id="tab-admins" class="flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic transition-all">Admin Settings</button>
            </div>

            <div id="usersTab" class="space-y-6">
                
                <div class="glass-card p-6 rounded-3xl mb-4 shadow-xl">
                    <div class="flex justify-between items-end mb-4">
                        <div class="w-2/3">
                            <label class="text-[9px] text-blue-400 font-black uppercase tracking-widest ml-2 mb-2 block">Mode Database</label>
                            <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-3 rounded-xl font-bold text-xs border border-slate-600 text-white outline-none">
                                <option value="lock1">Lock Password</option>
                                <option value="lock2" selected>Lock Pass & Username</option>
                                <option value="autologin">Lock Auto Login</option>
                            </select>
                        </div>
                        <div class="text-right">
                            <p id="totalUserCounter" class="text-3xl font-black text-white italic leading-none">0</p>
                            <p class="text-[8px] text-slate-500 font-bold uppercase">Total</p>
                        </div>
                    </div>
                    <div class="relative mt-2">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="searchInput" onkeyup="filterUserList()" placeholder="Cari ID atau Username..." class="w-full p-3 pl-10 bg-black/30 border border-slate-700 rounded-xl text-xs outline-none focus:border-blue-500 transition">
                    </div>
                </div>

                <div class="glass-card p-4 rounded-[2rem] shadow-xl grid grid-cols-2 gap-3 border border-white/5">
                    <button onclick="backupData()" class="bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 p-3 rounded-xl font-black text-[9px] uppercase hover:bg-indigo-600 hover:text-white transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-down"></i> Backup
                    </button>
                    <label class="bg-emerald-600/20 text-emerald-400 border border-emerald-500/30 p-3 rounded-xl font-black text-[9px] uppercase text-center cursor-pointer hover:bg-emerald-600 hover:text-white transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-cloud-arrow-up"></i> Restore
                        <input type="file" id="restoreFile" class="hidden" onchange="restoreData(this)">
                    </label>
                </div>

                <div id="userEditorArea" class="glass-card p-6 rounded-[2.5rem] shadow-2xl border-l-8 border-emerald-500">
                    <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-user-plus mr-2"></i> Tambah User
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="field_id" placeholder="ID Device" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <div id="usernameContainer"><input type="text" id="field_username" placeholder="Username" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none"></div>
                        <div id="passwordContainer"><input type="text" id="field_password" placeholder="Key / Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none"></div>
                        <input type="date" id="field_expiry" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <div id="offlineContainer" class="bg-black/40 p-4 rounded-2xl border border-slate-700 flex justify-between items-center">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-500">Allow Offline</span>
                            <select id="field_offline" class="bg-blue-600 text-white font-bold text-[10px] px-3 py-1 rounded-lg outline-none">
                                <option value="true">TRUE</option>
                                <option value="false">FALSE</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8">
                        <button id="cancelBtn" onclick="clearForm()" class="hidden flex-1 bg-slate-700 p-5 rounded-2xl font-black text-xs uppercase">Batal</button>
                        <button id="submitBtn" onclick="saveUser()" class="flex-[2] bg-emerald-600 p-5 rounded-2xl font-black text-xs uppercase btn-action">Simpan User</button>
                    </div>
                </div>

                <div id="userList" class="space-y-4"></div>
            </div>

            <div id="adminsTab" class="hidden space-y-6">
                <div id="configArea" class="hidden glass-card p-6 rounded-[2.5rem] shadow-2xl border-l-8 border-indigo-500">
                    <h2 class="text-indigo-400 font-black text-xs mb-6 uppercase tracking-widest italic">Config Global</h2>
                    <div class="space-y-4">
                        <input type="text" id="cfg_adminUrl" placeholder="Admin Telegram URL..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <textarea id="cfg_marquee" placeholder="Marquee Text..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none h-16"></textarea>
                        <button onclick="saveGlobalConfig()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase">Update Config</button>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-[2.5rem] shadow-2xl border-l-8 border-amber-500">
                    <h2 id="adminFormTitle" class="text-amber-400 font-black text-xs mb-6 uppercase tracking-widest flex items-center">
                        <i class="fa-solid fa-crown mr-2"></i> Admin Control
                    </h2>
                    <div class="space-y-4">
                        <input type="email" id="newAdminEmail" placeholder="Email Admin..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <input type="text" id="newAdminPass" placeholder="Password Admin..." class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl text-sm outline-none">
                        <div class="flex gap-2">
                            <button id="cancelAdminBtn" onclick="clearAdminForm()" class="hidden flex-1 bg-slate-700 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                            <button id="submitAdminBtn" onclick="saveAdmin()" class="flex-[2] bg-amber-600 text-white p-4 rounded-2xl font-black text-[10px] uppercase shadow-lg">Simpan Admin</button>
                        </div>
                    </div>
                </div>
                <div id="adminList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPER_ADMIN_EMAIL = "suwandiikhsan1@gmail.com"; 
        
        const firebaseConfig = {
            apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
            authDomain: "admin-panel-tks.firebaseapp.com",
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            projectId: "admin-panel-tks",
            storageBucket: "admin-panel-tks.firebasestorage.app",
            messagingSenderId: "543562286942",
            appId: "1:543562286942:web:8ba8d50b09610c9d1331cf"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let loggedInEmail = localStorage.getItem('tks_admin_email');
        let currentPath = "lock2";
        let cachedData = null;
        let editKey = null;
        let adminEditKey = null;
        let deleteKeyTarget = null;
        let deleteType = 'user';

        window.onload = () => { 
            if (localStorage.getItem('tks_admin_session') === 'active') showPanel();
        };

        async function checkAdminLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            try {
                const snap = await db.ref('AdminAccount').once('value');
                const admins = snap.val();
                let adminValid = (email === SUPER_ADMIN_EMAIL && pass === "suwandi123");
                
                if(!adminValid && admins) {
                    Object.values(admins).forEach(a => {
                        if(a.email === email && a.pass === pass) adminValid = true;
                    });
                }

                if (adminValid) {
                    localStorage.setItem('tks_admin_session', 'active');
                    localStorage.setItem('tks_admin_email', email);
                    localStorage.setItem('tks_admin_token', pass);
                    loggedInEmail = email;
                    showPanel();
                    showToast("Access Granted!");
                } else {
                    showToast("Invalid Credentials!", "error");
                }
            } catch (e) { showToast("Connection Error!", "error"); }
        }

        function showPanel() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            if (loggedInEmail === SUPER_ADMIN_EMAIL) {
                document.getElementById('adminTabNav').classList.remove('hidden');
                loadAdminList();
            }
            switchDatabase();
        }

        function doLogout() { localStorage.clear(); location.reload(); }

        function switchTab(tab) {
            document.getElementById('usersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('adminsTab').classList.toggle('hidden', tab !== 'admins');
            document.getElementById('tab-users').className = tab === 'users' ? 'flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg transition-all' : 'flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic';
            document.getElementById('tab-admins').className = tab === 'admins' ? 'flex-1 p-3 rounded-2xl bg-amber-600 text-[10px] font-black uppercase italic shadow-lg transition-all' : 'flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic';
        }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            document.getElementById('usernameContainer').classList.toggle('hidden', currentPath === "autologin" || currentPath === "lock1");
            document.getElementById('passwordContainer').classList.toggle('hidden', currentPath === "autologin");
            document.getElementById('offlineContainer').classList.toggle('hidden', currentPath === "autologin");
            document.getElementById('configArea').classList.toggle('hidden', currentPath !== "autologin");
            clearForm();
            db.ref(currentPath).off();
            loadFirebaseData();
        }

        function loadFirebaseData() {
            db.ref(currentPath).on('value', (snapshot) => {
                cachedData = snapshot.val();
                if (currentPath === "autologin" && cachedData) {
                    document.getElementById('cfg_adminUrl').value = cachedData.AdminUrl || "";
                    document.getElementById('cfg_marquee').value = cachedData.Marquee || "";
                }
                renderUsers();
            });
        }

        function renderUsers() {
            const list = document.getElementById('userList');
            const searchVal = document.getElementById('searchInput').value.toLowerCase();
            list.innerHTML = '';
            const usersObj = (currentPath === 'autologin') ? (cachedData?.Users || {}) : (cachedData || {});
            let count = 0;

            Object.entries(usersObj).forEach(([key, u]) => {
                if(!u) return;
                const searchStr = `${u.username || ''} ${u.id || u.ID || ''}`.toLowerCase();
                if (searchVal && !searchStr.includes(searchVal)) return;
                count++;
                list.innerHTML += `
                    <div class="glass-card p-5 rounded-[2.5rem] mb-4 border-l-4 border-slate-700">
                        <div class="flex justify-between items-center mb-3">
                            <div class="font-black text-white italic uppercase text-sm truncate pr-4">${(!currentPath.includes('auto') && u.username) ? u.username : (u.id || u.ID)}</div>
                            <div class="flex gap-2">
                                <button onclick="editUser('${key}')" class="w-9 h-9 bg-blue-500/10 text-blue-400 rounded-xl"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="triggerDelete('${key}', 'user')" class="w-9 h-9 bg-red-500/10 text-red-400 rounded-xl"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                        </div>
                        <div class="bg-black/40 p-4 rounded-2xl text-[10px] space-y-1">
                            <div class="flex justify-between"><span class="opacity-40 uppercase">ID</span><span class="text-blue-300 font-bold">${u.id || u.ID}</span></div>
                            <div class="flex justify-between border-t border-white/5 pt-1 mt-1"><span class="opacity-40 uppercase">Exp</span><span class="text-amber-400 font-bold">${u.Expiry || u.expiresAt || "-"}</span></div>
                        </div>
                    </div>`;
            });
            document.getElementById('totalUserCounter').innerText = count;
        }

        async function saveUser() {
            const devId = document.getElementById('field_id').value.trim();
            const expVal = document.getElementById('field_expiry').value;
            if(!devId || !expVal) return showToast("Isi ID & Exp!", "error");
            const newUser = { id: devId, ID: devId, expiresAt: expVal, Expiry: (currentPath === 'autologin' ? formatDateToDMY(expVal) : expVal), allowOffline: document.getElementById('field_offline').value === 'true' };
            if (currentPath === "lock2") newUser.username = document.getElementById('field_username').value || "User";
            if (currentPath !== "autologin") { newUser.key = document.getElementById('field_password').value; newUser.password = newUser.key; }
            const finalKey = editKey || db.ref().push().key;
            const path = (currentPath === 'autologin') ? `autologin/Users/${finalKey}` : `${currentPath}/${finalKey}`;
            await db.ref(path).set(newUser);
            showToast("Saved!"); clearForm();
        }

        function triggerDelete(key, type) { deleteKeyTarget = key; deleteType = type; document.getElementById('confirmModal').classList.remove('hidden'); document.getElementById('finalDeleteBtn').onclick = executeDelete; }

        async function executeDelete() {
            let path = deleteType === 'admin' ? `AdminAccount/${deleteKeyTarget}` : (currentPath === 'autologin' ? `autologin/Users/${deleteKeyTarget}` : `${currentPath}/${deleteKeyTarget}`);
            await db.ref(path).remove(); closeConfirm(); showToast("Deleted", "error");
        }

        async function backupData() {
            try {
                const snap = await db.ref().once('value');
                const blob = new Blob([JSON.stringify(snap.val(), null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `TKS_BACKUP_${new Date().getTime()}.json`; a.click();
                showToast("Backup Success!");
            } catch(e) { showToast("Backup Failed", "error"); }
        }

        function restoreData(input) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    if (confirm("Ganti semua data di database dengan file ini?")) {
                        await db.ref().set(json); showToast("Restore Success!"); location.reload();
                    }
                } catch(err) { showToast("Invalid File", "error"); }
            };
            reader.readAsText(input.files[0]);
        }

        // --- Fungsi Pelengkap ---
        function loadAdminList() {
            db.ref('AdminAccount').on('value', (snap) => {
                const list = document.getElementById('adminList'); list.innerHTML = '';
                if(!snap.val()) return;
                Object.entries(snap.val()).forEach(([key, admin]) => {
                    const isSuper = admin.email === SUPER_ADMIN_EMAIL;
                    list.innerHTML += `<div class="glass-card p-5 rounded-[2rem] flex justify-between items-center border border-white/5 mb-3">
                        <div><p class="text-[10px] font-black text-white uppercase italic">${admin.email}</p><p class="text-[9px] text-slate-500 font-bold uppercase">Pass: ${admin.pass}</p></div>
                        <div class="flex gap-2">${!isSuper ? `<button onclick="editAdmin('${key}')" class="w-8 h-8 bg-amber-500/10 text-amber-500 rounded-lg"><i class="fa-solid fa-pen text-[10px]"></i></button><button onclick="triggerDelete('${key}', 'admin')" class="w-8 h-8 bg-red-500/10 text-red-400 rounded-lg"><i class="fa-solid fa-trash text-[10px]"></i></button>` : '⭐'}</div>
                    </div>`;
                });
            });
        }
        async function saveAdmin() {
            const email = document.getElementById('newAdminEmail').value;
            const pass = document.getElementById('newAdminPass').value;
            const finalKey = adminEditKey || db.ref().push().key;
            await db.ref(`AdminAccount/${finalKey}`).set({ email, pass });
            showToast("Admin Updated"); clearAdminForm();
        }
        function editAdmin(key) {
            db.ref(`AdminAccount/${key}`).once('value', (s) => {
                const a = s.val(); adminEditKey = key;
                document.getElementById('newAdminEmail').value = a.email; document.getElementById('newAdminPass').value = a.pass;
                document.getElementById('adminFormTitle').innerText = "Update Admin"; document.getElementById('cancelAdminBtn').classList.remove('hidden');
            });
        }
        function clearAdminForm() { adminEditKey = null; document.getElementById('adminFormTitle').innerText = "Admin Control"; document.getElementById('newAdminEmail').value = ''; document.getElementById('newAdminPass').value = ''; document.getElementById('cancelAdminBtn').classList.add('hidden'); }
        async function saveGlobalConfig() { await db.ref('autologin').update({ AdminUrl: document.getElementById('cfg_adminUrl').value, Marquee: document.getElementById('cfg_marquee').value }); showToast("Config Saved"); }
        function editUser(key) {
            const u = (currentPath === 'autologin') ? cachedData.Users[key] : cachedData[key];
            editKey = key; document.getElementById('formTitle').innerText = "Update User"; document.getElementById('cancelBtn').classList.remove('hidden');
            document.getElementById('field_id').value = u.id || u.ID; document.getElementById('field_username').value = u.username || '';
            document.getElementById('field_password').value = u.key || u.password || ''; document.getElementById('field_expiry').value = currentPath === "autologin" ? formatDateToYMD(u.Expiry) : u.expiresAt;
        }
        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
        function clearForm() { editKey = null; document.getElementById('formTitle').innerText = "Tambah User"; document.getElementById('cancelBtn').classList.add('hidden'); ['field_id','field_username','field_password','field_expiry'].forEach(id => document.getElementById(id).value = ''); }
        function showToast(m, t='success') { const c = document.getElementById('toast-container'); const toast = document.createElement('div'); toast.className = `toast ${t==='error'?'border-red-500':'border-blue-500'}`; toast.innerHTML = m; c.appendChild(toast); setTimeout(() => toast.remove(), 2500); }
        function formatDateToDMY(d) { if(!d.includes('-')) return d; const [y,m,day]=d.split('-'); return `${day}/${m}/${y}`; }
        function formatDateToYMD(d) { if(!d.includes('/')) return d; const [day,m,y]=d.split('/'); return `${y}-${m}-${day}`; }
        function filterUserList() { renderUsers(); }
    </script>
</body>
</html>
