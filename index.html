<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM | Smart Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f1a; color: #e2e8f0; }
        .glass-card { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        #toast-container { position: fixed; top: 24px; right: 24px; z-index: 10000; }
        .toast {
            background: #1e293b; border-left: 4px solid #3b82f6; color: white; padding: 16px 24px;
            border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3); margin-bottom: 12px;
            font-size: 12px; font-weight: 800; text-transform: uppercase; display: flex; align-items: center;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .input-field { width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.3); border: 1px solid #334155; border-radius: 16px; font-size: 14px; outline: none; transition: 0.2s; color: white; }
        .input-field:focus { border-color: #3b82f6; background: rgba(0, 0, 0, 0.5); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <div id="toast-container"></div>

    <div id="confirmModal" class="hidden fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2rem] w-full max-w-xs text-center border-t-4 border-red-500">
            <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <h3 class="text-white font-extrabold uppercase italic">Konfirmasi</h3>
            <p id="modalMsg" class="text-slate-400 text-[11px] mt-2 mb-6">Apakah Anda yakin ingin menghapus data ini secara permanen?</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-xl font-bold text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-red-500/20">Hapus</button>
            </div>
        </div>
    </div>

    <div id="loginScreen" class="fixed inset-0 z-[500] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-10 rounded-[2.5rem] w-full max-w-sm shadow-2xl">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-4 rotate-3 shadow-xl shadow-blue-500/20">
                    <i class="fa-solid fa-shield-halved text-3xl text-white -rotate-3"></i>
                </div>
                <h2 class="text-2xl font-extrabold italic uppercase tracking-tight text-white">Security Login</h2>
            </div>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email Address" class="input-field">
                <input type="password" id="loginPass" placeholder="Password" class="input-field">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 p-4 rounded-2xl font-black text-xs uppercase transition-all active:scale-95 shadow-lg shadow-blue-500/20">Authorize Access</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <header class="bg-gradient-to-br from-blue-600 to-indigo-900 p-10 rounded-b-[3.5rem] shadow-2xl relative border-b border-white/10">
            <button onclick="handleLogout()" class="absolute right-8 top-8 w-10 h-10 bg-black/20 rounded-full flex items-center justify-center text-white/70 hover:text-white transition">
                <i class="fa-solid fa-power-off text-sm"></i>
            </button>
            <div class="text-center">
                <h1 class="text-3xl font-black italic uppercase tracking-tighter text-white">TKS TEAM ADMIN</h1>
                <p id="userStatus" class="text-[10px] font-bold text-blue-200/60 mt-2 tracking-[0.2em] uppercase"></p>
            </div>
        </header>

        <main class="max-w-md mx-auto px-6 -mt-8">
            <div id="tabBar" class="hidden flex p-2 bg-slate-900/50 backdrop-blur rounded-2xl mb-6 border border-white/5">
                <button onclick="switchTab('users')" id="btn-users" class="flex-1 py-3 rounded-xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg transition-all">Users</button>
                <button onclick="switchTab('admins')" id="btn-admins" class="flex-1 py-3 rounded-xl text-slate-400 text-[10px] font-black uppercase italic transition-all">Admins</button>
            </div>

            <section id="usersTab">
                <div class="glass-card p-6 rounded-[2rem] mb-6">
                    <div class="flex justify-between items-center mb-6">
                        <div class="w-3/5">
                            <label class="text-[8px] font-black uppercase text-blue-400 tracking-widest block mb-2">Database Mode</label>
                            <select id="dbMode" onchange="initDatabase()" class="w-full bg-slate-800 text-xs font-bold p-3 rounded-xl border border-slate-700 outline-none">
                                <option value="lock1">LOCK PASSWORD</option>
                                <option value="lock2" selected>LOCK USER & PASS</option>
                                <option value="autologin">AUTO LOGIN</option>
                            </select>
                        </div>
                        <div class="text-right">
                            <span class="text-[8px] font-black text-slate-500 uppercase block">Total</span>
                            <span id="userCount" class="text-4xl font-black text-white italic italic leading-none">0</span>
                        </div>
                    </div>
                    <div class="relative">
                        <i class="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
                        <input type="text" id="userSearch" onkeyup="renderUserList()" placeholder="Cari nama atau ID..." class="w-full p-3 pl-10 bg-black/40 border border-slate-700 rounded-xl text-xs outline-none">
                    </div>
                </div>

                <div id="configBox" class="hidden glass-card p-6 rounded-[2rem] mb-6 border-l-4 border-blue-500">
                    <h3 class="text-blue-400 font-black text-[10px] uppercase tracking-widest mb-4 flex items-center">
                        <i class="fa-solid fa-globe mr-2"></i> Global Configuration
                    </h3>
                    <div class="space-y-3">
                        <input type="text" id="confUrl" placeholder="Telegram URL" class="input-field text-xs">
                        <textarea id="confMsg" placeholder="Marquee Message" class="input-field text-xs h-16"></textarea>
                        <button onclick="saveGlobalConfig()" class="w-full bg-blue-600 p-3 rounded-xl font-bold text-[10px] uppercase">Update Config</button>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-[2rem] mb-8 border-l-4 border-emerald-500">
                    <h3 id="formTitle" class="text-emerald-400 font-black text-[10px] uppercase tracking-widest mb-6">Tambah User Baru</h3>
                    <div class="space-y-4">
                        <input type="text" id="in_id" placeholder="ID Device" class="input-field">
                        <div id="wrap_user"><input type="text" id="in_user" placeholder="Username" class="input-field"></div>
                        <div id="wrap_pass"><input type="text" id="in_pass" placeholder="Password / Key" class="input-field"></div>
                        <input type="date" id="in_exp" class="input-field">
                        <div id="wrap_offline" class="bg-black/20 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                            <span class="text-[10px] font-bold uppercase text-slate-400">Offline Mode</span>
                            <select id="in_offline" class="bg-emerald-600 text-[10px] font-black p-1 px-3 rounded-lg outline-none">
                                <option value="true">ENABLED</option>
                                <option value="false">DISABLED</option>
                            </select>
                        </div>
                    </div>
                    <div class="flex gap-2 mt-8">
                        <button id="btn-cancel" onclick="resetForm()" class="hidden flex-1 bg-slate-700 p-4 rounded-xl font-bold text-[10px] uppercase">Batal</button>
                        <button id="btn-submit" onclick="submitUser()" class="flex-[2] bg-emerald-600 p-4 rounded-xl font-bold text-[10px] uppercase shadow-lg shadow-emerald-500/20">Simpan User</button>
                    </div>
                </div>

                <div id="userList" class="space-y-4"></div>
            </section>

            <section id="adminsTab" class="hidden">
                <div class="glass-card p-6 rounded-[2rem] mb-6 border-l-4 border-amber-500">
                    <h3 class="text-amber-400 font-black text-[10px] uppercase tracking-widest mb-6">Manajemen Admin</h3>
                    <div class="space-y-4">
                        <input type="email" id="adm_email" placeholder="Email Admin Baru" class="input-field">
                        <input type="text" id="adm_pass" placeholder="Password" class="input-field">
                        <button onclick="addAdmin()" class="w-full bg-amber-600 p-4 rounded-xl font-black text-[10px] uppercase">Update Admin</button>
                    </div>
                </div>
                <div id="adminList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <script>
        const SUPER_ADMIN = "suwandiikhsan1@gmail.com";
        const config = { databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com" };
        firebase.initializeApp(config);
        const db = firebase.database();

        let currentMode = "lock2";
        let editIdx = -1;
        let cachedData = null;
        let deleteRef = null;

        // AUTH LOGIC
        async function handleLogin() {
            const e = document.getElementById('loginEmail').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            
            const snap = await db.ref('AdminAccount').once('value');
            const admins = Object.values(snap.val() || {});
            const valid = admins.find(a => a.email === e && a.pass === p);

            if (valid) {
                localStorage.setItem('tks_session', 'active');
                localStorage.setItem('tks_mail', e);
                showDashboard();
                showToast("Akses Diterima");
            } else {
                showToast("Akses Ditolak!", "error");
            }
        }

        function showDashboard() {
            const mail = localStorage.getItem('tks_mail');
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('userStatus').innerText = mail;
            
            if (mail === SUPER_ADMIN) {
                document.getElementById('tabBar').classList.remove('hidden');
                loadAdmins();
            }
            initDatabase();
        }

        function handleLogout() { localStorage.clear(); location.reload(); }

        // DATABASE LOGIC
        function initDatabase() {
            currentMode = document.getElementById('dbMode').value;
            const isAuto = currentMode === 'autologin';
            const isLock1 = currentMode === 'lock1';

            document.getElementById('wrap_user').classList.toggle('hidden', isAuto || isLock1);
            document.getElementById('wrap_pass').classList.toggle('hidden', isAuto);
            document.getElementById('wrap_offline').classList.toggle('hidden', isAuto);
            document.getElementById('configBox').classList.toggle('hidden', !isAuto);

            resetForm();
            
            db.ref(currentMode).on('value', (snap) => {
                cachedData = snap.val();
                if (isAuto && cachedData) {
                    document.getElementById('confUrl').value = cachedData.AdminUrl || "";
                    document.getElementById('confMsg').value = cachedData.Marquee || "";
                }
                renderUserList();
            });
        }

        function renderUserList() {
            const container = document.getElementById('userList');
            const search = document.getElementById('userSearch').value.toLowerCase();
            container.innerHTML = "";

            let items = [];
            if (currentMode === 'autologin') {
                items = cachedData?.Users || [];
            } else {
                items = Array.isArray(cachedData) ? cachedData : (cachedData ? Object.values(cachedData) : []);
            }

            let count = 0;
            items.forEach((u, i) => {
                if (!u) return;
                const title = (u.username || u.id || u.ID || "Unknown").toLowerCase();
                if (search && !title.includes(search)) return;

                count++;
                const isAuto = currentMode === 'autologin';
                const mainLabel = isAuto ? u.ID : (u.username || u.id);
                const isOff = u.allowOffline === true || u.allowOffline === "true";

                container.innerHTML += `
                    <div class="glass-card p-5 rounded-3xl relative overflow-hidden border-l-4 border-slate-600">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-white font-extrabold italic uppercase text-sm">${mainLabel}</h4>
                                <p class="text-[9px] text-slate-500 font-bold mt-1">ID: ${u.id || u.ID}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editUser(${i})" class="w-8 h-8 bg-blue-500/10 text-blue-400 rounded-lg"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                <button onclick="confirmDelete('user', ${i})" class="w-8 h-8 bg-red-500/10 text-red-400 rounded-lg"><i class="fa-solid fa-trash text-[10px]"></i></button>
                            </div>
                        </div>
                        <div class="mt-4 flex gap-4">
                            <div class="bg-black/30 px-3 py-2 rounded-xl flex-1">
                                <span class="text-[8px] text-slate-500 block uppercase font-black">Expired</span>
                                <span class="text-[10px] text-amber-400 font-bold">${u.Expiry || u.expiresAt || '-'}</span>
                            </div>
                            ${!isAuto ? `
                            <div class="bg-black/30 px-3 py-2 rounded-xl flex-1">
                                <span class="text-[8px] text-slate-500 block uppercase font-black">Offline</span>
                                <span class="text-[10px] ${isOff?'text-emerald-400':'text-red-400'} font-bold">${isOff?'YES':'NO'}</span>
                            </div>` : ''}
                        </div>
                    </div>`;
            });
            document.getElementById('userCount').innerText = count;
        }

        async function submitUser() {
            const id = document.getElementById('in_id').value.trim();
            const exp = document.getElementById('in_exp').value;
            if (!id || !exp) return showToast("ID & Exp Wajib!", "error");

            let list = [];
            if (currentMode === 'autologin') {
                let base = cachedData || { Users: [] };
                const obj = { ID: id, Expiry: dmy(exp) };
                if (editIdx > -1) base.Users[editIdx] = obj; else base.Users.push(obj);
                await db.ref(currentMode).set(base);
            } else {
                list = Array.isArray(cachedData) ? [...cachedData] : (cachedData ? Object.values(cachedData) : []);
                const obj = {
                    id: id, expiresAt: exp,
                    key: document.getElementById('in_pass').value,
                    password: document.getElementById('in_pass').value,
                    allowOffline: document.getElementById('in_offline').value === "true"
                };
                if (currentMode === 'lock2') obj.username = document.getElementById('in_user').value || "User";
                if (editIdx > -1) list[editIdx] = obj; else list.push(obj);
                await db.ref(currentMode).set(list);
            }
            showToast("Data Berhasil Disimpan");
            resetForm();
        }

        function editUser(i) {
            let items = (currentMode === 'autologin') ? cachedData.Users : (Array.isArray(cachedData) ? cachedData : Object.values(cachedData));
            const u = items[i];
            editIdx = i;
            
            document.getElementById('formTitle').innerText = "Update User";
            document.getElementById('btn-cancel').classList.remove('hidden');
            document.getElementById('in_id').value = u.id || u.ID;
            document.getElementById('in_user').value = u.username || "";
            document.getElementById('in_pass').value = u.key || u.password || "";
            document.getElementById('in_offline').value = String(u.allowOffline);
            document.getElementById('in_exp').value = (currentMode === 'autologin') ? ymd(u.Expiry) : u.expiresAt;
            
            window.scrollTo({ top: 150, behavior: 'smooth' });
        }

        async function saveGlobalConfig() {
            let base = cachedData || { Users: [] };
            base.AdminUrl = document.getElementById('confUrl').value;
            base.Marquee = document.getElementById('confMsg').value;
            await db.ref(currentMode).set(base);
            showToast("Global Config Diperbarui");
        }

        // ADMIN MANAGEMENT
        function loadAdmins() {
            db.ref('AdminAccount').on('value', (snap) => {
                const list = document.getElementById('adminList');
                list.innerHTML = "";
                const data = Object.values(snap.val() || {});
                data.forEach((a, i) => {
                    const isS = a.email === SUPER_ADMIN;
                    list.innerHTML += `
                        <div class="glass-card p-4 rounded-2xl flex justify-between items-center ${isS?'border-amber-500/20':''}">
                            <div>
                                <p class="text-[10px] font-black text-white uppercase italic">${a.email} ${isS?'⭐':''}</p>
                                <p class="text-[9px] text-slate-500">Pass: ${a.pass}</p>
                            </div>
                            ${!isS ? `<button onclick="confirmDelete('admin', ${i})" class="text-red-400 p-2"><i class="fa-solid fa-user-xmark"></i></button>` : ''}
                        </div>`;
                });
            });
        }

        async function addAdmin() {
            const e = document.getElementById('adm_email').value;
            const p = document.getElementById('adm_pass').value;
            if (!e || !p) return showToast("Lengkapi data!", "error");
            
            const snap = await db.ref('AdminAccount').once('value');
            let admins = Object.values(snap.val() || {});
            const idx = admins.findIndex(a => a.email === e);
            if (idx > -1) admins[idx].pass = p; else admins.push({ email: e, pass: p });
            
            await db.ref('AdminAccount').set(admins);
            showToast("Admin Diperbarui");
        }

        // HELPERS
        function confirmDelete(type, i) {
            deleteRef = { type, i };
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = async () => {
                if (deleteRef.type === 'user') {
                    if (currentMode === 'autologin') {
                        cachedData.Users.splice(deleteRef.i, 1);
                        await db.ref(currentMode).set(cachedData);
                    } else {
                        let list = Array.isArray(cachedData) ? [...cachedData] : Object.values(cachedData);
                        list.splice(deleteRef.i, 1);
                        await db.ref(currentMode).set(list);
                    }
                } else {
                    const s = await db.ref('AdminAccount').once('value');
                    let a = Object.values(s.val());
                    a.splice(deleteRef.i, 1);
                    await db.ref('AdminAccount').set(a);
                }
                closeConfirm();
                showToast("Terhapus", "error");
            };
        }

        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
        function showToast(m, t='success') {
            const c = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${t==='error'?'border-red-500':'border-blue-500'}`;
            toast.innerHTML = `<i class="fa-solid ${t==='error'?'fa-circle-xmark':'fa-circle-check'} mr-3"></i> ${m}`;
            c.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=>toast.remove(), 300); }, 2500);
        }
        function resetForm() {
            editIdx = -1; document.getElementById('formTitle').innerText = "Tambah User Baru";
            document.getElementById('btn-cancel').classList.add('hidden');
            ['in_id','in_user','in_pass','in_exp'].forEach(id => document.getElementById(id).value = "");
        }
        function switchTab(t) {
            document.getElementById('usersTab').classList.toggle('hidden', t !== 'users');
            document.getElementById('adminsTab').classList.toggle('hidden', t !== 'admins');
            document.getElementById('btn-users').className = t === 'users' ? 'flex-1 py-3 rounded-xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg' : 'flex-1 py-3 rounded-xl text-slate-400 text-[10px] font-black uppercase italic';
            document.getElementById('btn-admins').className = t === 'admins' ? 'flex-1 py-3 rounded-xl bg-amber-600 text-white text-[10px] font-black uppercase italic shadow-lg' : 'flex-1 py-3 rounded-xl text-slate-400 text-[10px] font-black uppercase italic';
        }
        function dmy(s) { const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }
        function ymd(s) { const [d,m,y] = s.split('/'); return `${y}-${m}-${d}`; }

        window.onload = () => { if(localStorage.getItem('tks_session')) showDashboard(); };
    </script>
</body>
</html>
