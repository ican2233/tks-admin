<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM Smart Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; }
        .toast { background: rgba(15, 23, 42, 0.95); color: white; padding: 14px 24px; border-radius: 18px; margin-bottom: 10px; font-size: 11px; font-weight: 800; border-left: 5px solid #10b981; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#0b0f1a] min-h-screen pb-20 font-sans text-slate-200">

    <div id="toast-container"></div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center px-6">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-xs border-t-4 border-red-500 text-center">
            <h3 class="text-white font-black uppercase mb-4">Hapus Data?</h3>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 bg-slate-800 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                <button id="finalDeleteBtn" class="flex-1 bg-red-600 p-4 rounded-2xl font-black text-[10px] uppercase">Hapus</button>
            </div>
        </div>
    </div>

    <!-- Login -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500">
            <h2 class="text-xl font-black text-center mb-8 uppercase">Admin Access</h2>
            <input type="email" id="loginEmail" placeholder="Email" class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm">
            <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm">
            <button onclick="checkAdminLogin()" class="w-full bg-blue-600 p-4 rounded-2xl font-black text-xs uppercase">Login</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 text-center rounded-b-[3rem]">
            <h1 class="text-2xl font-black uppercase">TKS TEAM Admin</h1>
            <button onclick="doLogout()" class="mt-2 text-white/50 text-xs uppercase">Logout</button>
        </div>

        <div class="max-w-md mx-auto px-4 mt-6">
            <div id="adminTabNav" class="hidden flex gap-2 mb-6">
                <button onclick="switchTab('users')" id="tab-users" class="flex-1 p-3 rounded-2xl bg-blue-600 text-[10px] font-black uppercase italic shadow-lg">User Management</button>
                <button onclick="switchTab('admins')" id="tab-admins" class="flex-1 p-3 rounded-2xl bg-slate-800 text-[10px] font-black uppercase italic">Admin Settings</button>
            </div>

            <!-- TAB USERS -->
            <div id="usersTab">
                <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-4 rounded-2xl mb-4 text-xs font-bold text-white outline-none">
                    <option value="lock1">Lock Password</option>
                    <option value="lock2" selected>Lock Pass & User</option>
                    <option value="autologin">Lock Auto Login</option>
                </select>
                <div class="flex gap-2 mb-4">
                    <button onclick="backupData()" class="flex-1 bg-indigo-600/20 border border-indigo-500/50 text-indigo-400 p-3 rounded-2xl font-black text-[10px] uppercase">Backup</button>
                    <button onclick="document.getElementById('restoreInput').click()" class="flex-1 bg-emerald-600/20 border border-emerald-500/50 text-emerald-400 p-3 rounded-2xl font-black text-[10px] uppercase">Restore</button>
                    <input type="file" id="restoreInput" class="hidden" accept=".json" onchange="restoreData(event)">
                </div>
                <div id="totalUserCounter" class="text-center font-black text-2xl mb-4">0</div>
                
                <div id="configArea" class="hidden glass-card p-6 rounded-[2.5rem] mb-4">
                    <input type="text" id="cfg_adminUrl" placeholder="Admin URL" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <textarea id="cfg_marquee" placeholder="Running Text" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm"></textarea>
                    <button onclick="saveGlobalConfig()" class="w-full bg-blue-600 p-4 rounded-2xl font-black text-[10px] uppercase">Simpan Config</button>
                </div>

                <div id="userEditorArea" class="glass-card p-6 rounded-[2.5rem] mb-8 border-l-8 border-emerald-500">
                    <h2 id="formTitle" class="text-emerald-400 font-black text-xs mb-6 uppercase">Tambah User</h2>
                    <input type="text" id="field_id" placeholder="ID Device" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <div id="usernameContainer"><input type="text" id="field_username" placeholder="Username" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm"></div>
                    <div id="passwordContainer"><input type="text" id="field_password" placeholder="Key / Password" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm"></div>
                    <input type="date" id="field_expiry" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <select id="field_offline" class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                        <option value="true">Offline: TRUE</option><option value="false">Offline: FALSE</option>
                    </select>
                    <div class="flex gap-2">
                        <button id="cancelBtn" onclick="clearForm()" class="hidden flex-1 bg-slate-700 p-4 rounded-2xl font-black text-[10px] uppercase">Batal</button>
                        <button id="submitBtn" onclick="saveUser()" class="flex-[2] bg-emerald-600 p-4 rounded-2xl font-black text-[10px] uppercase">Simpan User</button>
                    </div>
                </div>
                <input type="text" id="searchInput" onkeyup="filterUserList()" placeholder="Search..." class="w-full p-4 mb-4 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                <div id="userList" class="space-y-4"></div>
            </div>

            <!-- TAB ADMINS -->
            <div id="adminsTab" class="hidden">
                <div class="glass-card p-6 rounded-[2.5rem] mb-8 border-l-8 border-amber-500">
                    <input type="email" id="newAdminEmail" placeholder="Email Admin" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <input type="text" id="newAdminPass" placeholder="Password Admin" class="w-full p-4 mb-2 bg-black/40 border border-slate-700 rounded-2xl text-sm">
                    <button onclick="saveAdmin()" class="w-full bg-amber-600 p-4 rounded-2xl font-black text-[10px] uppercase">Update/Tambah Admin</button>
                </div>
                <div id="adminList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPER_ADMIN_EMAIL = "suwandiikhsan1@gmail.com";
        const firebaseConfig = {
            apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
            authDomain: "admin-panel-tks.firebaseapp.com",
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            projectId: "admin-panel-tks",
            storageBucket: "admin-panel-tks.firebasestorage.app",
            messagingSenderId: "543562286942",
            appId: "1:543562286942:web:8ba8d50b09610c9d1331cf",
            measurementId: "G-QZ8YWVRHGZ"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentPath = "lock2";
        let rawData = null;
        let editingIndex = -1;
        let deleteIndexTarget = -1;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                if (user.email === SUPER_ADMIN_EMAIL) {
                    document.getElementById('adminTabNav').classList.remove('hidden');
                    loadAdminList();
                }
                switchDatabase();
            } else {
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('mainContent').classList.add('hidden');
            }
        });

        async function checkAdminLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            try { await auth.signInWithEmailAndPassword(email, pass); } 
            catch(e) { showToast("Login Gagal", "error"); }
        }

        function doLogout() { auth.signOut(); }

        // MENGGABUNGKAN SEMUA FUNGSI CRUD, TAB, DAN DATABASE DISINI
        function switchTab(tab) {
            document.getElementById('usersTab').classList.toggle('hidden', tab !== 'users');
            document.getElementById('adminsTab').classList.toggle('hidden', tab !== 'admins');
        }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            const isAuto = currentPath === "autologin";
            document.getElementById('usernameContainer').classList.toggle('hidden', isAuto || currentPath === "lock1");
            document.getElementById('passwordContainer').classList.toggle('hidden', isAuto);
            document.getElementById('configArea').classList.toggle('hidden', !isAuto);
            loadFirebaseData();
        }

        function loadFirebaseData() {
            db.ref(currentPath).on('value', (s) => {
                rawData = s.val();
                if (currentPath === "autologin" && rawData) {
                    document.getElementById('cfg_adminUrl').value = rawData.AdminUrl || "";
                    document.getElementById('cfg_marquee').value = rawData.Marquee || "";
                }
                renderUsers();
            });
        }

        function renderUsers() {
    const list = document.getElementById('userList');
    const search = document.getElementById('searchInput').value.toLowerCase();
    let rawDataObj = rawData || {};
    
    list.innerHTML = '';
    let count = 0;
    
    // Loop berdasarkan KEY (Device ID), bukan index array
    Object.keys(rawDataObj).forEach((deviceId) => {
        let u = rawDataObj[deviceId];
        if(!u || !JSON.stringify(u).toLowerCase().includes(search)) return;
        
        count++;
        let isOffline = u.allowOffline === true || u.allowOffline === "true";
        let offlineText = isOffline ? '<span class="text-emerald-400">ON</span>' : '<span class="text-red-400">OFF</span>';
        
        list.innerHTML += `<div class="glass-card p-5 rounded-2xl flex justify-between items-center mb-3">
            <div>
                <p class="font-bold text-sm text-white">${u.savedId || deviceId}</p>
                <p class="text-[9px] text-slate-400">Key: ${u.savedKey ? '***' : '-'}</p>
                <p class="text-[9px] text-slate-400">Offline: ${offlineText}</p>
            </div>
            <div class="flex gap-2">
                <button onclick="editUser('${deviceId}')" class="text-blue-400 p-2"><i class="fa-solid fa-pen"></i></button>
                <button onclick="deleteUser('${deviceId}')" class="text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>`;
    });
    document.getElementById('totalUserCounter').innerText = count;
}


        async function saveUser() {
    const devId = document.getElementById('field_id').value; // Ini adalah savedId
    const key = document.getElementById('field_password').value; // Ini adalah savedKey
    
    if(!devId || !key) return showToast("Isi ID dan Key!", "error");

    // Ambil data lama dulu agar tidak menimpa user lain
    let snapshot = await db.ref(currentPath).once('value');
    let data = snapshot.val() || {};
    
    // Gunakan devId sebagai KEY (bukan array index) sesuai format SIGER
    data[devId] = {
        savedId: devId,
        savedKey: key,
        allowOffline: document.getElementById('field_offline').value === 'true'
    };

    try {
        await db.ref(currentPath).set(data);
        showToast("User Berhasil Disimpan!"); 
        clearForm();
    } catch (e) {
        showToast("Gagal Simpan: " + e.message, "error");
    }
}


        function editUser(i) {
            editingIndex = i;
            let u = (currentPath === "autologin" ? rawData.Users : (Array.isArray(rawData) ? rawData : []))[i];
            document.getElementById('field_id').value = u.id || u.ID;
            document.getElementById('field_password').value = u.key || u.password || '';
            document.getElementById('field_expiry').value = u.expiresAt || '';
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function deleteUser(i) {
            deleteIndexTarget = i;
            document.getElementById('confirmModal').classList.remove('hidden');
            document.getElementById('finalDeleteBtn').onclick = async () => {
                let d = (currentPath === "autologin" ? rawData.Users : (Array.isArray(rawData) ? [...rawData] : []));
                d.splice(deleteIndexTarget, 1);
                await db.ref(currentPath).set(d);
                closeConfirm(); showToast("User Dihapus");
            };
        }

        function backupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(rawData));
            const a = document.createElement('a'); a.href = dataStr; a.download = `backup_${currentPath}.json`; a.click();
        }

        function restoreData(e) {
            const reader = new FileReader();
            reader.onload = async (ev) => { await db.ref(currentPath).set(JSON.parse(ev.target.result)); showToast("Restore Berhasil!"); };
            reader.readAsText(e.target.files[0]);
        }

        function loadAdminList() {
            db.ref('AdminAccount').on('value', s => {
                const list = document.getElementById('adminList'); list.innerHTML = '';
                Object.values(s.val() || {}).forEach((a, i) => {
                    list.innerHTML += `<div class="glass-card p-4 rounded-2xl flex justify-between"><span>${a.email}</span></div>`;
                });
            });
        }

        async function saveAdmin() {
    const email = document.getElementById('newAdminEmail').value;
    const pass = document.getElementById('newAdminPass').value;
    if(!email || !pass) return showToast("Isi Email & Pass!", "error");
    
    const s = await db.ref('AdminAccount').once('value');
    let admins = Object.values(s.val() || {});
    
    // Cek apakah email sudah ada, jika ya update password-nya
    const idx = admins.findIndex(a => a.email === email);
    if(idx > -1) {
        admins[idx].pass = pass;
    } else {
        admins.push({email, pass});
    }
    
    await db.ref('AdminAccount').set(admins);
    showToast("Admin Diperbarui!");
    document.getElementById('newAdminEmail').value = ''; 
    document.getElementById('newAdminPass').value = '';
}


        function closeConfirm() { document.getElementById('confirmModal').classList.add('hidden'); }
        function clearForm() { editingIndex = -1; document.getElementById('field_id').value = ''; document.getElementById('cancelBtn').classList.add('hidden'); }
        function filterUserList() { renderUsers(); }
        function showToast(m, t='success') {
            const c = document.getElementById('toast-container');
            const d = document.createElement('div'); d.className = `toast ${t==='error'?'border-red-500':'border-emerald-500'}`;
            d.innerHTML = m; c.appendChild(d); setTimeout(() => d.remove(), 2500);
        }
        
        function formatDateToDMY(d) { 
    if(!d.includes('-')) return d; 
    const [y,m,day]=d.split('-'); 
    return `${day}/${m}/${y}`; 
}

    </script>
</body>
</html>
