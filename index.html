<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKS TEAM ADMIN - FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none !important; }
        .toast {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #1e293b; color: white; padding: 12px 24px; border-radius: 12px;
            font-size: 11px; font-weight: 800; border-left: 4px solid #3b82f6;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body class="bg-[#0b0f1a] text-slate-200 min-h-screen pb-10">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-[#0b0f1a] flex items-center justify-center px-4">
        <div class="glass-card p-8 rounded-[2.5rem] w-full max-w-sm border-t-4 border-blue-500">
            <h2 class="text-center text-xl font-black italic uppercase mb-6">Admin Access</h2>
            <div class="space-y-4">
                <input type="email" id="loginEmail" placeholder="Email" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl outline-none focus:border-blue-500">
                <input type="password" id="loginPass" placeholder="Password" class="w-full p-4 bg-black/40 border border-slate-700 rounded-2xl outline-none focus:border-blue-500">
                <button onclick="checkAdminLogin()" class="w-full bg-blue-600 p-4 rounded-2xl font-black uppercase text-xs">Login</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="bg-gradient-to-r from-blue-700 to-indigo-900 p-8 shadow-2xl rounded-b-[3rem] text-center relative mb-6">
            <h1 class="text-2xl font-black italic text-white uppercase">TKS TEAM ADMIN</h1>
            <button onclick="location.reload()" class="absolute right-6 top-6 text-white/50"><i class="fa-solid fa-power-off"></i></button>
        </div>

        <div class="max-w-md mx-auto px-4">
            <div class="glass-card p-6 rounded-3xl mb-6 flex justify-between items-center">
                <div class="w-2/3">
                    <label class="text-[9px] text-blue-400 font-black uppercase mb-1 block">Mode Database</label>
                    <select id="lockSelector" onchange="switchDatabase()" class="w-full bg-slate-800 p-2 rounded-xl text-xs font-bold border-none outline-none">
                        <option value="lock1">Lock Password</option>
                        <option value="lock2" selected>Lock Pass & Username</option>
                        <option value="autologin">Lock Auto Login</option>
                    </select>
                </div>
                <div class="text-right">
                    <p id="totalCount" class="text-3xl font-black">0</p>
                    <p class="text-[8px] text-slate-500 font-bold uppercase">Total User</p>
                </div>
            </div>

            <div class="glass-card p-6 rounded-[2.5rem] border-l-8 border-emerald-500 mb-8">
                <h3 id="formTitle" class="text-emerald-400 font-black text-xs uppercase mb-4 tracking-widest">Tambah User Baru</h3>
                <div class="space-y-3">
                    <input type="text" id="f_id" placeholder="ID Device (Contoh: 8D3F0B...)" class="w-full p-4 bg-black/30 border border-slate-800 rounded-2xl text-sm outline-none focus:border-emerald-500">
                    <input type="text" id="f_user" placeholder="Username" class="w-full p-4 bg-black/30 border border-slate-800 rounded-2xl text-sm outline-none focus:border-emerald-500">
                    <input type="text" id="f_pass" placeholder="Password / Key" class="w-full p-4 bg-black/30 border border-slate-800 rounded-2xl text-sm outline-none focus:border-emerald-500">
                    <input type="date" id="f_exp" class="w-full p-4 bg-black/30 border border-slate-800 rounded-2xl text-sm outline-none">
                    <button onclick="saveUser()" class="w-full bg-emerald-600 p-4 rounded-2xl font-black uppercase text-xs shadow-lg shadow-emerald-900/20">Simpan Data</button>
                </div>
            </div>

            <div id="userList" class="space-y-4">
                </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDYmuh79olonBM6WH9Uqmv1k46rAgMIzqU",
            authDomain: "admin-panel-tks.firebaseapp.com",
            databaseURL: "https://admin-panel-tks-default-rtdb.firebaseio.com",
            projectId: "admin-panel-tks",
            storageBucket: "admin-panel-tks.firebasestorage.app",
            messagingSenderId: "543562286942",
            appId: "1:543562286942:web:8ba8d50b09610c9d1331cf"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentPath = "lock2";
        let editKey = null;

        // Login Check
        async function checkAdminLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            // Simple Super Admin check
            if(email === "suwandiikhsan1@gmail.com" && pass === "suwandi123") {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                switchDatabase();
            } else {
                alert("Login Gagal!");
            }
        }

        function switchDatabase() {
            currentPath = document.getElementById('lockSelector').value;
            db.ref(currentPath).off(); // Reset listener lama
            loadData();
        }

        function loadData() {
            db.ref(currentPath).on('value', (snap) => {
                const list = document.getElementById('userList');
                list.innerHTML = '';
                const data = snap.val();
                let count = 0;

                if(data) {
                    // Cek jika path adalah autologin (karena strukturnya agak beda biasanya)
                    const users = (currentPath === 'autologin' && data.Users) ? data.Users : data;
                    
                    Object.entries(users).forEach(([key, val]) => {
                        if(!val || typeof val !== 'object') return;
                        count++;
                        
                        // Menyesuaikan pembacaan field agar tidak error
                        const dID = val.id || val.ID || "-";
                        const dUser = val.username || val.Username || "No Username";
                        const dPass = val.password || val.key || val.Pass || "No Pass";
                        const dExp = val.expiresAt || val.Expiry || "-";

                        list.innerHTML += `
                            <div class="glass-card p-5 rounded-[2rem] border-l-4 border-blue-500 relative">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <h4 class="font-black text-white text-sm uppercase">${dUser}</h4>
                                        <p class="text-[10px] text-blue-400 font-bold">${dID}</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onclick="prepareEdit('${key}')" class="text-blue-400 p-2"><i class="fa-solid fa-pen"></i></button>
                                        <button onclick="deleteUser('${key}')" class="text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                </div>
                                <div class="grid grid-cols-2 gap-2 bg-black/40 p-3 rounded-xl">
                                    <div>
                                        <p class="text-[8px] text-slate-500 uppercase font-bold">Password</p>
                                        <p class="text-[10px] text-emerald-400 font-mono">${dPass}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-[8px] text-slate-500 uppercase font-bold">Expiry</p>
                                        <p class="text-[10px] text-amber-500 font-bold">${dExp}</p>
                                    </div>
                                </div>
                            </div>`;
                    });
                }
                document.getElementById('totalCount').innerText = count;
            });
        }

        async function saveUser() {
            const id = document.getElementById('f_id').value;
            const user = document.getElementById('f_user').value;
            const pass = document.getElementById('f_pass').value;
            const exp = document.getElementById('f_exp').value;

            if(!id || !exp) return alert("ID dan Expiry wajib diisi!");

            const payload = {
                id: id, ID: id,
                username: user, Username: user,
                password: pass, key: pass, Pass: pass,
                expiresAt: exp, Expiry: exp
            };

            const path = (currentPath === 'autologin') ? `autologin/Users` : currentPath;
            
            if(editKey) {
                await db.ref(`${path}/${editKey}`).update(payload);
                editKey = null;
                document.getElementById('formTitle').innerText = "Tambah User Baru";
            } else {
                await db.ref(path).push(payload);
            }

            // Clear Form
            ['f_id','f_user','f_pass','f_exp'].forEach(i => document.getElementById(i).value = '');
            alert("Data Berhasil Disimpan!");
        }

        function prepareEdit(key) {
            const path = (currentPath === 'autologin') ? `autologin/Users/${key}` : `${currentPath}/${key}`;
            db.ref(path).once('value', (s) => {
                const v = s.val();
                editKey = key;
                document.getElementById('formTitle').innerText = "Update User: " + (v.username || key);
                document.getElementById('f_id').value = v.id || v.ID || '';
                document.getElementById('f_user').value = v.username || v.Username || '';
                document.getElementById('f_pass').value = v.password || v.key || '';
                document.getElementById('f_exp').value = v.expiresAt || v.Expiry || '';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        async function deleteUser(key) {
            if(confirm("Hapus user ini secara permanen?")) {
                const path = (currentPath === 'autologin') ? `autologin/Users/${key}` : `${currentPath}/${key}`;
                await db.ref(path).remove();
            }
        }
    </script>
</body>
</html>
